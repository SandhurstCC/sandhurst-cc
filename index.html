<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sandhurst CC">
<link rel="manifest" href="manifest.json">
<title>Sandhurst CC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f4f4f2;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;color:#111}
#app{max-width:520px;margin:0 auto;padding:12px 14px 80px;min-height:100vh}
button{cursor:pointer;-webkit-appearance:none;touch-action:manipulation;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:10px;border:1px solid #ccc;font-size:14px;font-weight:500;background:#fff;color:#333}
.btn.full{width:100%;margin-bottom:8px}
.btn.primary{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.btn.blue{background:#185fa5;color:#fff;border-color:#185fa5}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost-red{background:#fff;color:#a32d2d;border-color:#f09595}
.btn.icon-btn{background:none;border:none;color:#bbb;font-size:20px;padding:2px 8px}
input,select{width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:10px;color:#111;background:#fff;-webkit-appearance:none;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1a5c2e}
label{display:block;font-size:13px;color:#888;margin-bottom:5px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px}
.topbar-left{display:flex;align-items:center;gap:10px}
.club-name{font-size:16px;font-weight:700;color:#1a5c2e}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-m{background:#e6f1fb;color:#185fa5}
.badge-mgr{background:#d4eadc;color:#1a5c2e}
.badge-ro{background:#faeeda;color:#854f0b}
.sec{font-size:17px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#999;margin-bottom:14px}
.av-c{width:34px;height:34px;border-radius:50%;background:#d4eadc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1a5c2e;flex-shrink:0}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.p-row:last-child{border-bottom:none}
.p-name{font-size:14px;font-weight:500;flex:1}
.tog{padding:6px 11px;border-radius:8px;border:1px solid #e0e0e0;font-size:13px;font-weight:600;color:#aaa;background:#fafafa;touch-action:manipulation}
.tog.ay{background:#d4eadc;border-color:#9fd4a4;color:#1a5c2e}
.tog.an{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.tog.am{background:#faeeda;border-color:#fac775;color:#854f0b}
.atag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600;white-space:nowrap}
.tag-y{background:#d4eadc;color:#1a5c2e}
.tag-n{background:#fcebeb;color:#a32d2d}
.tag-m{background:#faeeda;color:#854f0b}
.tag-0{background:#f0f0f0;color:#999}
.match-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:auto;-webkit-overflow-scrolling:touch}
@media(hover:hover){.match-scroll::-webkit-scrollbar{height:6px}.match-scroll::-webkit-scrollbar-track{background:#f0f0f0;border-radius:3px}.match-scroll::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}}

.mtab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:12px;font-weight:500;color:#888;background:#fafafa;text-align:left;min-width:120px;touch-action:manipulation}
.mtab.home{border-left:4px solid #1a5c2e}
.mtab.away{border-left:4px solid #185fa5}
.mtab.sel.home{background:#d4eadc;color:#1a5c2e;border-color:#9fd4a4;border-left-color:#1a5c2e}
.mtab.sel.away{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4;border-left-color:#185fa5}
.pill{display:inline-flex;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px}
.pill.home{background:#f4f9f4;color:#1a5c2e;border:1px solid #c8dfc8}
.pill.away{background:#e6f1fb;color:#185fa5;border:1px solid #b5d4f4}
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{flex:1;background:#f4f9f4;border-radius:10px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1a5c2e}
.stat-l{font-size:11px;color:#999;margin-top:2px}
.tab-bar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
@media(hover:hover){.tab-bar::-webkit-scrollbar{height:6px}.tab-bar::-webkit-scrollbar-track{background:#f0f0f0;border-radius:3px}.tab-bar::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid #ddd;font-size:13px;font-weight:500;color:#888;background:#fafafa;position:relative;touch-action:manipulation}
.tab-btn.sel{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.nbadge{position:absolute;top:-5px;right:-5px;background:#e24b4a;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.bat-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #c8dfc8;background:#f4f9f4;touch-action:pan-y;user-select:none}
.bat-row.drag-over{border-color:#1a5c2e;border-style:dashed;background:#e0f0e6}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #eee;background:#fff;touch-action:manipulation}
.bnum{width:26px;height:26px;border-radius:50%;background:#e6f1fb;color:#185fa5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bnum.on{background:#1a5c2e;color:#fff}
.dh{color:#ccc;font-size:18px;padding:0 3px;flex-shrink:0;cursor:grab;user-select:none;touch-action:none}
.warn{background:#faeeda;border:1px solid #fac775;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#854f0b}
.err-box{background:#fcebeb;border:1px solid #f09595;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#a32d2d}
.login-wrap{max-width:320px;margin:30px auto 0;padding:0 4px}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px}
.login-title{text-align:center;font-size:18px;font-weight:700;color:#1a5c2e;margin-bottom:3px}
.login-sub{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.login-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hint{font-size:12px;color:#bbb;text-align:center;margin-top:10px}
.divider{text-align:center;font-size:13px;color:#bbb;margin:4px 0 12px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#eee}
.divider::before{left:0}.divider::after{right:0}
.sync{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s}
.sync.on{background:#1a5c2e}
.notif-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.ndot{width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0;margin-top:4px}
.ndot.r{background:transparent}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5}
.set-row:last-child{border-bottom:none}
.num-inp{width:60px;text-align:center;margin:0;padding:6px 8px;font-size:14px}
.mfrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pend-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.pend-row:last-child{border-bottom:none}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a5c2e;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:90vw;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.err-msg{color:#a32d2d;font-size:13px;padding:8px 12px;background:#fcebeb;border-radius:8px;margin-bottom:10px;text-align:center;display:none}
.role-btn{padding:3px 8px;border-radius:6px;border:1px solid #ddd;font-size:11px;font-weight:700;background:#f5f5f5;color:#aaa;cursor:pointer;flex-shrink:0;touch-action:manipulation;line-height:1.5;margin-right:3px}
.role-btn:active{opacity:.7}
.role-on-cap{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.role-on-wk{background:#185fa5;color:#fff;border-color:#185fa5}
.tea-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;cursor:pointer}
.tea-card.locked{cursor:default}
.tea-check{width:26px;height:26px;border-radius:8px;border:2px solid #ddd;background:#fafafa;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.tea-check.on{background:#854f0b;border-color:#854f0b;color:#fff}
.tea-check.taken{background:#f0f0f0;border-color:#ddd}
.role-btn{padding:3px 8px;border-radius:6px;border:1px solid #ddd;font-size:11px;font-weight:700;background:#f5f5f5;color:#aaa;cursor:pointer;flex-shrink:0;touch-action:manipulation;line-height:1.5;margin-right:3px}
.role-btn:active{opacity:.7}
.role-on-cap{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.role-on-wk{background:#185fa5;color:#fff;border-color:#185fa5}
</style>
</head>

function doLogin(){
  const nameEl=document.getElementById('f-name');
  const pinEl=document.getElementById('f-pin');
  const errEl=document.getElementById('f-err');
  const name=(nameEl?nameEl.value:'').trim().toLowerCase().replace(/\s+/g,' ');
  const pin=(pinEl?pinEl.value:'').trim();
  if(errEl)errEl.style.display='none';
  if(!name||!pin){showErr('Enter your name and PIN.');return;}
  if(window._firebaseReady){
    fbGet('sandhurst/users').then(s=>{
      const users=s.val()?Object.values(s.val()):SEEDS;
      tryLogin(users,name,pin);
    }).catch(()=>tryLogin(Object.values(DB.users).length?Object.values(DB.users):SEEDS,name,pin));
  } else {
    tryLogin(SEEDS,name,pin);
  }
}

function tryLogin(users,name,pin){
  const user=users.find(u=>u.name.toLowerCase()===name&&u.status==='active');
  if(!user){showErr('Name not recognised. Check spelling or register below.');return;}
  if(user.pin!==hp(pin)){showErr('Incorrect PIN.');return;}
  saveSes(user);
  fbSet('sandhurst/users/'+user.id+'/lastSeen',Date.now());
  if(user.mustChange){UI.screen='pin';render();return;}
  UI.screen=(user.role==='manager'||user.role==='readonly')?'mgr':'mem';
  render();
}

function doChangePin(){
  const np=(document.getElementById('f-np')?document.getElementById('f-np').value:'').trim();
  const conf=(document.getElementById('f-cp')?document.getElementById('f-cp').value:'').trim();
  if(np.length<4){showErr('PIN must be at least 4 digits.');return;}
  if(np!==conf){showErr('PINs do not match.');return;}
  if(np==='1000'){showErr('Choose a different PIN.');return;}
  const hashed=hp(np);
  updPin(hashed,false);
  fbSet('sandhurst/users/'+SES.uid+'/pin',hashed);
  fbSet('sandhurst/users/'+SES.uid+'/mustChange',false);
  UI.screen=(SES.role==='manager'||SES.role==='readonly')?'mgr':'mem';
  toast('PIN set — welcome, '+(SES.name?SES.name.split(' ')[0]:'')+'!');
  render();
}

function doRegister(){
  const name=(document.getElementById('f-rname')?document.getElementById('f-rname').value:'').trim();
  const np=(document.getElementById('f-rpin')?document.getElementById('f-rpin').value:'').trim();
  const conf=(document.getElementById('f-rconf')?document.getElementById('f-rconf').value:'').trim();
  if(name.length<2){showErr('Enter your full name.');return;}
  if(np.length<4){showErr('PIN must be 4+ digits.');return;}
  if(np!==conf){showErr('PINs do not match.');return;}
  if(np==='1000'){showErr('Choose a different PIN.');return;}
  const all=Object.values(DB.users).length?Object.values(DB.users):SEEDS;
  if(all.find(u=>u.name.toLowerCase()===name.toLowerCase())){showErr('Name already registered.');return;}
  const uid='u_'+Date.now().toString(36);
  fbSet('sandhurst/users/'+uid,{id:uid,name,role:'member',pin:hp(np),mustChange:false,status:'pending',captain:false,keeper:false});
  addNotif('New player registered: '+name,'manager',null,'registration');
  UI.screen='pending';render();
}

function setAv(mid,uid,val){
  if(!SES.uid)return;
  if(SES.role==='readonly')return;
  if(SES.role==='member'&&SES.uid!==uid)return;
  if(SES.role==='member'&&isLk(mid))return;
  const newVal=getAv(mid,uid)===val?'none':val;
  if(!DB.avail[mid])DB.avail[mid]={};
  DB.avail[mid][uid]=newVal;
  renderAvailList(mid);
  fbSet('sandhurst/avail/'+mid+'/'+uid,newVal);
  fbSet('sandhurst/availability/'+mid+'/'+uid,newVal);
  if(newVal!=='none'&&(SES.uid!==uid||SES.role!=='manager')){
    const p=DB.users[uid]||SEEDS.find(u=>u.id===uid);
    const m=getM(mid);
    const lbl={yes:'Available',no:'Unavailable',maybe:'Maybe'};
    addNotif((p?p.name:'Player')+' marked '+lbl[newVal]+' for vs '+(m?m.opponent:'match')+' ('+fmtD(m?m.date:'')+')','manager',mid,'avail');
  }
}

function getTea(mid){return (DB.avail[mid]||{}).__tea__||null;}

function setTea(mid){
  if(!SES.uid)return;
  if(SES.role==='readonly')return;
  if(isLk(mid)&&SES.role!=='manager')return;
  const current=getTea(mid);
  if(current&&current!==SES.uid){toast('Already taken by '+((DB.users[current]||{}).name||'someone'));return;}
  const newVal=current===SES.uid?null:SES.uid;
  if(!DB.avail[mid])DB.avail[mid]={};
  if(newVal)DB.avail[mid].__tea__=newVal;
  else delete DB.avail[mid].__tea__;
  fbSet('sandhurst/avail/'+mid+'/__tea__',newVal||null);
  if(newVal){const m=getM(mid);addNotif(SES.name+' volunteered to make tea for vs '+(m?m.opponent:'match')+' ('+fmtD(m?m.date:'')+')','manager',mid,'tea');}
  render();
}

    doc.setFont('times','bold');doc.setFontSize(13);doc.setTextColor(30,30,30);
    doc.text((i+1)+'.  '+display.toUpperCase()+sfx,cx,y,{align:'center'});y+=lineH;
  });}
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(20,ph-46,pw-20,ph-46);
  doc.setFont('times','normal');doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text('RED BALL SPONSOR FOR 2026',cx,ph-39,{align:'center'});
  doc.setFont('times','bold');doc.setFontSize(14);doc.setTextColor(30,30,30);
  doc.text('THE WOODCOCK INN',cx,ph-29,{align:'center'});
  doc.setFont('times','normal');doc.setFontSize(11);doc.setTextColor(30,30,30);
  doc.text('IDEN GREEN',cx,ph-20,{align:'center'});
  doc.setFont('times','normal');doc.setFontSize(6);doc.setTextColor(180,180,180);
  doc.text('Sandhurst Cricket Club · Est. 1949 · Kent',cx,ph-11,{align:'center'});

function renderAvailList(mid){
  const listEl=document.getElementById('av-list');
  if(!listEl)return;
  const pl=allP();
  const lk=isLk(mid);
  const isMgr=SES.role==='manager';
  const isRO=SES.role==='readonly';
  listEl.innerHTML='';
  pl.forEach(p=>{
    const av=getAv(mid,p.id);
    const me=p.id===SES.uid;
    const canEdit=isMgr?!isRO:(me&&!lk);
    const row=document.createElement('div');
    row.className='p-row';
    if(!me&&!isMgr)row.style.cssText='opacity:.3;pointer-events:none';
    const circle=document.createElement('div');
    circle.className='av-c';
    if(me)circle.style.cssText='background:#1a5c2e;color:#fff';
    circle.textContent=ini(p.name);
    row.appendChild(circle);
    const nm=document.createElement('div');
    nm.className='p-name';
    nm.textContent=p.name;
    if(isMgr&&(p.captain||p.keeper)){nm.textContent+=' ';nm.innerHTML+=syms(p,true);}
    row.appendChild(nm);
    if(canEdit){
      const grp=document.createElement('div');
      grp.style.cssText='display:flex;gap:'+(me?'5':'3')+'px';
      const items=me
        ?[['Yes','yes','ay'],['Maybe','maybe','am'],['No','no','an']]
        :[['Y','yes','ay'],['M','maybe','am'],['N','no','an']];
      items.forEach(function(item){
        const lbl=item[0],val=item[1],cls=item[2];
        const btn=document.createElement('button');
        btn.className='tog'+(av===val?' '+cls:'');
        btn.textContent=lbl;
        (function(m2,u2,v2,b){b.addEventListener('click',function(){
          if(isMgr&&!me){
            if(b.dataset.pending==='1'){b.dataset.pending='0';setAv(m2,u2,v2);}
            else{
              b.dataset.pending='1';
              const origTxt=b.textContent,origCls=b.className;
              b.textContent='Sure?';b.style.background='#b45309';b.style.color='#fff';b.style.borderColor='#b45309';
              setTimeout(function(){if(b.dataset.pending==='1'){b.dataset.pending='0';b.textContent=origTxt;b.className=origCls;b.style.cssText='';}},3000);
            }
          } else {setAv(m2,u2,v2);}
        });})(mid,p.id,val,btn);
        grp.appendChild(btn);
      });
      row.appendChild(grp);
    } else {
      const tagMap={yes:'tag-y',no:'tag-n',maybe:'tag-m',none:'tag-0'};
      const lblMap={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'Not set'};
      if(isMgr){const tagMap2={yes:'tag-y',no:'tag-n',maybe:'tag-m',none:'tag-0'};const lblMap2={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'No response'};const tag=document.createElement('span');tag.className='atag '+(tagMap2[av]||'tag-0');tag.textContent=lblMap2[av]||'No response';row.appendChild(tag);}
      else{const tag=document.createElement('span');tag.className='atag '+(tagMap[av]||'tag-0');tag.textContent=lblMap[av]||'Not set';row.appendChild(tag);}
    }
    listEl.appendChild(row);
  });
}
