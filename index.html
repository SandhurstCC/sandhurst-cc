<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a5c2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sandhurst CC">
<link rel="manifest" href="manifest.json">
<title>Sandhurst CC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f4f4f2;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:15px;color:#111}
#app{max-width:520px;margin:0 auto;padding:12px 14px 80px;min-height:100vh}
button{cursor:pointer;-webkit-appearance:none;touch-action:manipulation;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:10px;border:1px solid #ccc;font-size:14px;font-weight:500;background:#fff;color:#333}
.btn.full{width:100%;margin-bottom:8px}
.btn.primary{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.btn.blue{background:#185fa5;color:#fff;border-color:#185fa5}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost-red{background:#fff;color:#a32d2d;border-color:#f09595}
.btn.icon-btn{background:none;border:none;color:#bbb;font-size:20px;padding:2px 8px}
input,select{width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:10px;color:#111;background:#fff;-webkit-appearance:none;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#1a5c2e}
label{display:block;font-size:13px;color:#888;margin-bottom:5px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px}
.topbar-left{display:flex;align-items:center;gap:10px}
.club-name{font-size:16px;font-weight:700;color:#1a5c2e}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-m{background:#e6f1fb;color:#185fa5}
.badge-mgr{background:#d4eadc;color:#1a5c2e}
.badge-ro{background:#faeeda;color:#854f0b}
.sec{font-size:17px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#999;margin-bottom:14px}
.av-c{width:34px;height:34px;border-radius:50%;background:#d4eadc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1a5c2e;flex-shrink:0}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.p-row:last-child{border-bottom:none}
.p-name{font-size:14px;font-weight:500;flex:1}
.tog{padding:6px 11px;border-radius:8px;border:1px solid #e0e0e0;font-size:13px;font-weight:600;color:#aaa;background:#fafafa;touch-action:manipulation}
.tog.ay{background:#d4eadc;border-color:#9fd4a4;color:#1a5c2e}
.tog.an{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.tog.am{background:#faeeda;border-color:#fac775;color:#854f0b}
.atag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600;white-space:nowrap}
.tag-y{background:#d4eadc;color:#1a5c2e}
.tag-n{background:#fcebeb;color:#a32d2d}
.tag-m{background:#faeeda;color:#854f0b}
.tag-0{background:#f0f0f0;color:#999}
.match-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:auto;-webkit-overflow-scrolling:touch}
@media(hover:hover){.match-scroll::-webkit-scrollbar{height:6px}.match-scroll::-webkit-scrollbar-track{background:#f0f0f0;border-radius:3px}.match-scroll::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}}

.mtab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:12px;font-weight:500;color:#888;background:#fafafa;text-align:left;min-width:120px;touch-action:manipulation}
.mtab.home{border-left:4px solid #1a5c2e}
.mtab.away{border-left:4px solid #185fa5}
.mtab.sel.home{background:#d4eadc;color:#1a5c2e;border-color:#9fd4a4;border-left-color:#1a5c2e}
.mtab.sel.away{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4;border-left-color:#185fa5}
.pill{display:inline-flex;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px}
.pill.home{background:#f4f9f4;color:#1a5c2e;border:1px solid #c8dfc8}
.pill.away{background:#e6f1fb;color:#185fa5;border:1px solid #b5d4f4}
.stats{display:flex;gap:8px;margin-bottom:14px}
.stat{flex:1;background:#f4f9f4;border-radius:10px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1a5c2e}
.stat-l{font-size:11px;color:#999;margin-top:2px}
.tab-bar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
@media(hover:hover){.tab-bar::-webkit-scrollbar{height:6px}.tab-bar::-webkit-scrollbar-track{background:#f0f0f0;border-radius:3px}.tab-bar::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid #ddd;font-size:13px;font-weight:500;color:#888;background:#fafafa;position:relative;touch-action:manipulation}
.tab-btn.sel{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.nbadge{position:absolute;top:-5px;right:-5px;background:#e24b4a;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.bat-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #c8dfc8;background:#f4f9f4;touch-action:pan-y;user-select:none}
.bat-row.drag-over{border-color:#1a5c2e;border-style:dashed;background:#e0f0e6}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #eee;background:#fff;touch-action:manipulation}
.bnum{width:26px;height:26px;border-radius:50%;background:#e6f1fb;color:#185fa5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bnum.on{background:#1a5c2e;color:#fff}
.dh{color:#ccc;font-size:18px;padding:0 3px;flex-shrink:0;cursor:grab;user-select:none;touch-action:none}
.warn{background:#faeeda;border:1px solid #fac775;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#854f0b}
.err-box{background:#fcebeb;border:1px solid #f09595;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#a32d2d}
.login-wrap{max-width:320px;margin:30px auto 0;padding:0 4px}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px}
.login-title{text-align:center;font-size:18px;font-weight:700;color:#1a5c2e;margin-bottom:3px}
.login-sub{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.login-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hint{font-size:12px;color:#bbb;text-align:center;margin-top:10px}
.divider{text-align:center;font-size:13px;color:#bbb;margin:4px 0 12px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#eee}
.divider::before{left:0}.divider::after{right:0}
.sync{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s}
.sync.on{background:#1a5c2e}
.notif-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.notif-row:last-child{border-bottom:none}
.ndot{width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0;margin-top:4px}
.ndot.r{background:transparent}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5}
.set-row:last-child{border-bottom:none}
.num-inp{width:60px;text-align:center;margin:0;padding:6px 8px;font-size:14px}
.mfrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pend-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.pend-row:last-child{border-bottom:none}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a5c2e;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:90vw;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.err-msg{color:#a32d2d;font-size:13px;padding:8px 12px;background:#fcebeb;border-radius:8px;margin-bottom:10px;text-align:center;display:none}
</style>
</head>

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function fbSet(path,val){if(DEMO_MODE||!window._db)return;window._set(window._ref(window._db,path),val);}
function fbGet(path){return window._get(window._ref(window._db,path));}

function initFB(){
  if(!window._firebaseReady){document.addEventListener('firebase-ready',initFB,{once:true});return;}
  // Seed only once, only if empty, never in demo mode
  if(!DEMO_MODE&&!window._seeded){
    window._seeded=true;
    fbGet('sandhurst/users').then(s=>{if(!DEMO_MODE&&!s.val()){const o={};SEEDS.forEach(u=>{o[u.id]=u;});fbSet('sandhurst/users',o);}});
    fbGet('sandhurst/matches').then(s=>{if(!DEMO_MODE&&!s.val()){const o={};SEED_MATCHES.forEach(m=>{o[m.id]=m;});fbSet('sandhurst/matches',o);}});
    fbGet('sandhurst/settings').then(s=>{if(!DEMO_MODE&&!s.val())fbSet('sandhurst/settings',DEF_SETTINGS);});
  }
  // Separate listeners per path - no single root listener
  const noRe=['login','pin','register','pending'];
  window._onValue(window._ref(window._db,'sandhurst/users'),s=>{if(DEMO_MODE)return;DB.users=s.val()||{};if(!noRe.includes(UI.screen))render();});
  window._onValue(window._ref(window._db,'sandhurst/matches'),s=>{if(DEMO_MODE)return;DB.matches=s.val()||{};DB.live=true;if(!DB.matches[UI.mid])UI.mid=Object.keys(DB.matches)[0]||SEED_MATCHES[0].id;if(!noRe.includes(UI.screen))render();});
  window._onValue(window._ref(window._db,'sandhurst/settings'),s=>{if(DEMO_MODE)return;DB.settings={...DEF_SETTINGS,...(s.val()||{})};if(!noRe.includes(UI.screen))render();});
  window._onValue(window._ref(window._db,'sandhurst/notifications'),s=>{if(DEMO_MODE)return;const d=s.val()||{};DB.notifs=Object.values(d).sort((a,b)=>b.ts-a.ts);if(!noRe.includes(UI.screen))render();});
  // Avail and squad: one-time load, refresh on tab switch
  function loadAvail(){if(DEMO_MODE)return;fbGet('sandhurst/avail').then(s=>{if(s.val()){DB.avail=s.val();render();}else{fbGet('sandhurst/availability').then(s2=>{DB.avail=s2.val()||{};render();});}});}
  function loadSquad(){if(DEMO_MODE)return;fbGet('sandhurst/squad').then(s=>{DB.squad=s.val()||{};render();});}
  if(!DEMO_MODE){loadAvail();loadSquad();}
}

function refreshAvSq(){
  if(DEMO_MODE)return;
  fbGet('sandhurst/avail').then(s=>{if(s.val()){DB.avail=s.val();render();}else{fbGet('sandhurst/availability').then(s2=>{DB.avail=s2.val()||{};render();});}});
  fbGet('sandhurst/squad').then(s=>{DB.squad=s.val()||{};render();});
}

}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin(){
  const nameEl=document.getElementById('f-name');
  const pinEl=document.getElementById('f-pin');
  const errEl=document.getElementById('f-err');
  const name=(nameEl?nameEl.value:'').trim().toLowerCase().replace(/\s+/g,' ');
  const pin=(pinEl?pinEl.value:'').trim();
  if(errEl)errEl.style.display='none';
  if(!name||!pin){showErr('Enter your name and PIN.');return;}
  // Always fetch fresh from Firebase
  if(window._firebaseReady){
    fbGet('sandhurst/users').then(s=>{
      const users=s.val()?Object.values(s.val()):SEEDS;
      tryLogin(users,name,pin);
    }).catch(()=>tryLogin(Object.values(DB.users).length?Object.values(DB.users):SEEDS,name,pin));
  } else {
    tryLogin(SEEDS,name,pin);
  }
}

function tryLogin(users,name,pin){
  const user=users.find(u=>u.name.toLowerCase()===name&&u.status==='active');
  if(!user){showErr('Name not recognised. Check spelling or register below.');return;}
  if(user.pin!==hp(pin)){showErr('Incorrect PIN.');return;}
  saveSes(user);
  if(user.mustChange){UI.screen='pin';render();return;}
  UI.screen=(user.role==='manager'||user.role==='readonly')?'mgr':'mem';
  render();
}

function doChangePin(){
  const np=(document.getElementById('f-np')?document.getElementById('f-np').value:'').trim();
  const conf=(document.getElementById('f-cp')?document.getElementById('f-cp').value:'').trim();
  if(np.length<4){showErr('PIN must be at least 4 digits.');return;}
  if(np!==conf){showErr('PINs do not match.');return;}
  if(np==='1000'){showErr('Choose a different PIN.');return;}
  const hashed=hp(np);
  updPin(hashed,false);
  fbSet('sandhurst/users/'+SES.uid+'/pin',hashed);
  fbSet('sandhurst/users/'+SES.uid+'/mustChange',false);
  UI.screen=(SES.role==='manager'||SES.role==='readonly')?'mgr':'mem';
  toast('PIN set — welcome, '+(SES.name?SES.name.split(' ')[0]:'')+'!');
  render();
}

function doRegister(){
  const name=(document.getElementById('f-rname')?document.getElementById('f-rname').value:'').trim();
  const np=(document.getElementById('f-rpin')?document.getElementById('f-rpin').value:'').trim();
  const conf=(document.getElementById('f-rconf')?document.getElementById('f-rconf').value:'').trim();
  if(name.length<2){showErr('Enter your full name.');return;}
  if(np.length<4){showErr('PIN must be 4+ digits.');return;}
  if(np!==conf){showErr('PINs do not match.');return;}
  if(np==='1000'){showErr('Choose a different PIN.');return;}
  const all=Object.values(DB.users).length?Object.values(DB.users):SEEDS;
  if(all.find(u=>u.name.toLowerCase()===name.toLowerCase())){showErr('Name already registered.');return;}
  const uid='u_'+Date.now().toString(36);
  fbSet('sandhurst/users/'+uid,{id:uid,name,role:'member',pin:hp(np),mustChange:false,status:'pending',captain:false,keeper:false});
  addNotif('New player registered: '+name,'manager',null,'registration');
  UI.screen='pending';render();
}

function doLogout(){clearSes();UI.screen='login';UI.tab=0;render();}

function showErr(msg){
  const el=document.getElementById('f-err');
  if(el){el.textContent=msg;el.style.display='block';}
}

// ── AVAILABILITY ──────────────────────────────────────────────────────────────
function setAv(mid,uid,val){
  if(!SES.uid)return;
  if(SES.role==='readonly')return;
  if(SES.role==='member'&&SES.uid!==uid)return;
  if(SES.role==='member'&&isLk(mid))return;
  // Toggle off if same value
  const newVal=getAv(mid,uid)===val?'none':val;
  if(!DB.avail[mid])DB.avail[mid]={};
  DB.avail[mid][uid]=newVal;
  // Update UI immediately - just re-render the avail list
  renderAvailList(mid);
  // Write to Firebase
  fbSet('sandhurst/avail/'+mid+'/'+uid,newVal);
  fbSet('sandhurst/availability/'+mid+'/'+uid,newVal);
  // Notify
  if(newVal!=='none'&&(SES.uid!==uid||SES.role!=='manager')){
    const p=DB.users[uid]||SEEDS.find(u=>u.id===uid);
    const m=getM(mid);
    const lbl={yes:'Available',no:'Unavailable',maybe:'Maybe'};
    addNotif((p?p.name:'Player')+' marked '+lbl[newVal]+' for vs '+(m?m.opponent:'match')+' ('+fmtD(m?m.date:'')+')','manager',mid,'avail');
  }
}

function togSq(mid,uid){
  if(SES.role!=='manager')return;
  const sq=[...getSq(mid)];
  const i=sq.indexOf(uid);
  if(i>-1)sq.splice(i,1);
  else{if(sq.length>=11){toast('XI already full');return;}sq.push(uid);}
  DB.squad[mid]=sq;
  render();
  fbSet('sandhurst/squad/'+mid,sq);
}

let dragU=null;
function dS(e,u){dragU=u;e.dataTransfer.effectAllowed='move';}

function dD(e,mid){
  e.preventDefault();
  const t=e.currentTarget.dataset.uid;
  if(!dragU||dragU===t)return;
  const sq=[...getSq(mid)];
  const fi=sq.indexOf(dragU),ti=sq.indexOf(t);
  if(fi>-1&&ti>-1){sq.splice(fi,1);sq.splice(ti,0,dragU);}
  DB.squad[mid]=sq;render();fbSet('sandhurst/squad/'+mid,sq);
}

function tEn(e){if(!tCl)return;document.body.removeChild(tCl);tCl=null;if(tEl)tEl.style.opacity='';const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const row=el&&el.closest('.bat-row');if(row&&row.dataset.uid!==tU&&tM&&SES.role==='manager'){const sq=[...getSq(tM)];const fi=sq.indexOf(tU),ti=sq.indexOf(row.dataset.uid);if(fi>-1&&ti>-1){sq.splice(fi,1);sq.splice(ti,0,tU);}DB.squad[tM]=sq;render();fbSet('sandhurst/squad/'+tM,sq);}tU=null;tM=null;tEl=null;}

function doPDF(mid){if(!window.jspdf){toast('Loading...');return;}const{jsPDF}=window.jspdf;const doc=new jsPDF();const match=getM(mid);const sq=getSq(mid);const pw=doc.internal.pageSize.getWidth();const ph=doc.internal.pageSize.getHeight();const img=new Image();img.src=LOGO;img.onload=function(){try{doc.setGState(doc.GState({opacity:0.07}));doc.addImage(img,'JPEG',pw/2-50,ph/2-50,100,100);}catch(e){}try{doc.setGState(doc.GState({opacity:1}));doc.addImage(img,'JPEG',14,8,22,22);}catch(e){}doc.setTextColor(26,92,46);doc.setFont('helvetica','bold');doc.setFontSize(16);doc.text('Sandhurst Cricket Club',40,18);doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80,80,80);doc.text('vs '+match.opponent+'  ·  '+fmtD(match.date)+' '+(match.time||'')+'  ·  '+match.venue,40,26);doc.text('Generated: '+new Date().toLocaleDateString('en-GB'),40,32);doc.setDrawColor(26,92,46);doc.setLineWidth(0.5);doc.line(14,36,pw-14,36);let y=48;doc.setFillColor(26,92,46);doc.rect(14,y-7,pw-28,9,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('#',16,y);doc.text('Player',26,y);doc.text('Notes',155,y);y+=11;if(!sq.length){doc.setTextColor(180,180,180);doc.setFont('helvetica','normal');doc.text('No players selected yet.',16,y+6);}else{sq.forEach((uid,i)=>{const p=DB.users[uid];if(!p)return;if(i%2===0){doc.setFillColor(244,249,244);doc.rect(14,y-6,pw-28,10,'F');}doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(String(i+1),16,y);doc.text(p.name,26,y);const notes=[];if(p.captain)notes.push('Captain');if(p.keeper)notes.push('Wicketkeeper');if(notes.length)doc.text(notes.join(' · '),155,y);y+=10;});}doc.setDrawColor(26,92,46);doc.line(14,y+4,pw-14,y+4);doc.setTextColor(180,180,180);doc.setFontSize(8);doc.text('Sandhurst Cricket Club · Est. 1949 · Kent',pw/2,ph-8,{align:'center'});doc.save('SandhurstCC_vs_'+match.opponent.replace(/\s/g,'_')+'.pdf');};}

function mTabs(onSwitch){
  const ml=Object.values(DB.matches).sort((a,b)=>a.date.localeCompare(b.date));
  if(!ml.length)return '<div style="color:#bbb;font-size:13px;margin-bottom:14px">No matches yet.</div>';
  let h='<div class="match-scroll" onscroll="saveMatchScroll(this)">';
  ml.forEach(m=>{
    const cls=m.venue==='Home'?'home':'away';
    const sel=UI.mid===m.id?'sel':'';
    const d=dTo(m.id);const lk=isLk(m.id);
    const extra=onSwitch?onSwitch:'';
    h+='<button class="mtab '+cls+' '+sel+'" onclick="UI.mid=\''+m.id+'\';'+extra+'render()">'
      +'<div style="font-weight:600;font-size:13px">'+m.opponent+'</div>'
      +'<div style="font-size:11px;opacity:.75;margin-top:2px">'+fmtD(m.date)+(m.time?' '+m.time:'')+'</div>'
      +(lk?'<div style="font-size:10px;color:#a32d2d;margin-top:1px">🔒 Locked</div>':d>0&&d<=DB.settings.reminderDays?'<div style="font-size:10px;color:#854f0b">'+d+'d</div>':'')
      +'</button>';
  });
  return h+'</div>';
}

function pillHtml(m){return '<span class="pill '+(m.venue==='Home'?'home':'away')+'">vs '+m.opponent+' · '+fmtD(m.date)+(m.time?' at '+m.time:'')+' · '+m.venue+'</span>';}

// ── AVAILABILITY LIST (partial re-render) ────────────────────────────────────
function renderAvailList(mid){
  const listEl=document.getElementById('av-list');
  if(!listEl)return;
  const pl=allP();
  const lk=isLk(mid);
  const isMgr=SES.role==='manager';
  const isRO=SES.role==='readonly';
  // Clear and rebuild
  listEl.innerHTML='';
  pl.forEach(p=>{
    const av=getAv(mid,p.id);
    const me=p.id===SES.uid;
    const canEdit=isMgr?!isRO:(me&&!lk);
    const row=document.createElement('div');
    row.className='p-row';
    if(!me&&!isMgr)row.style.cssText='opacity:.3;pointer-events:none';
    // Avatar
    const circle=document.createElement('div');
    circle.className='av-c';
    if(me)circle.style.cssText='background:#1a5c2e;color:#fff';
    circle.textContent=ini(p.name);
    row.appendChild(circle);
    // Name
    const nm=document.createElement('div');
    nm.className='p-name';
    nm.textContent=p.name;
    if(isMgr&&(p.captain||p.keeper)){nm.textContent+=' ';nm.innerHTML+=syms(p,true);}
    row.appendChild(nm);
    if(canEdit){
      // Toggles - create as DOM elements with real event listeners
      const grp=document.createElement('div');
      grp.style.cssText='display:flex;gap:'+(me?'5':'3')+'px';
      const items=me
        ?[['Yes','yes','ay'],['Maybe','maybe','am'],['No','no','an']]
        :[['Y','yes','ay'],['M','maybe','am'],['N','no','an']];
      items.forEach(function(item){
        const lbl=item[0],val=item[1],cls=item[2];
        const btn=document.createElement('button');
        btn.className='tog'+(av===val?' '+cls:'');
        btn.textContent=lbl;
        // Capture mid, uid, val in closure
        (function(m2,u2,v2){btn.addEventListener('click',function(){setAv(m2,u2,v2);});})(mid,p.id,val);
        grp.appendChild(btn);
      });
      row.appendChild(grp);
    } else {
      // Status tag
      const tagMap={yes:'tag-y',no:'tag-n',maybe:'tag-m',none:'tag-0'};
      const lblMap={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'Not set'};
      if(isMgr){const tagMap2={yes:'tag-y',no:'tag-n',maybe:'tag-m',none:'tag-0'};const lblMap2={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'No response'};const tag=document.createElement('span');tag.className='atag '+(tagMap2[av]||'tag-0');tag.textContent=lblMap2[av]||'No response';row.appendChild(tag);}
      else{const tag=document.createElement('span');tag.className='atag '+(tagMap[av]||'tag-0');tag.textContent=lblMap[av]||'Not set';row.appendChild(tag);}
    }
    listEl.appendChild(row);
  });
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const s=UI.screen;
  if(s==='login')  return rLogin(app);
  if(s==='pin')    return rPin(app);
  if(s==='register')return rReg(app);
  if(s==='pending') return rPending(app);
  if(s==='mem')    return rMem(app);
  if(s==='mgr')    return rMgr(app);
  rLogin(app);
}

  // Don't rebuild if already showing - just update error

    if(e)e.style.display='none';
    return;
  }
  const html='<div class="login-wrap">'
    +'<img src="'+LOGO+'" class="login-logo">'
    +'<div class="login-title">Sandhurst CC</div>'
    +'<div class="login-sub">Sign in to continue</div>'
    +'<div class="login-card">'
    +'<label>Your name</label>'
    +'<input id="f-name" type="text" placeholder="e.g. Joe Root" autocomplete="name" autocorrect="off" autocapitalize="words" spellcheck="false">'
    +'<label>PIN</label>'
    +'<input id="f-pin" type="password" placeholder="Enter PIN" inputmode="numeric" style="letter-spacing:4px;font-size:18px;text-align:center">'
    +'<div id="f-err" class="err-msg"></div>'
    +'<button class="btn primary full" onclick="doLogin()">Sign in</button>'
    +'<div class="divider">or</div>'
    +'<button class="btn full" style="background:#f4f4f2;border-color:#e0e0e0;color:#555" onclick="UI.screen=\'register\';render()">New player? Register here</button>'
    +'<div class="hint">First time? Use PIN: 1000</div>'
    +'<div class="divider">or</div>'
    +'<button class="btn full" style="background:#e6f1fb;border-color:#b5d4f4;color:#185fa5" onclick="enterDemo()">👀 Try demo (no login needed)</button>'
    +'</div></div>';
  app.innerHTML=html;

          h+='<div class="bat-row" '+da+'>'+(isRO?'':'<span class="dh" draggable="true" ondragstart="dS(event,\''+uid+'\')" ondragend="dEn()" ontouchstart="tS(event,\''+uid+'\',\''+mid+'\')" ontouchmove="tMv(event)" ontouchend="tEn(event)">⠿</span>')+'<div class="bnum on">'+(i+1)+'</div><div class="av-c" style="background:#1a5c2e;color:#fff">'+ini(p.name)+'</div><div class="p-name">'+p.name+syms(p,true)+'</div><span class="atag '+(av==='yes'?'tag-y':'tag-m')+'" style="margin-right:4px">'+(av==='yes'?'Avail':'Maybe')+'</span>'+(isRO?'':'<button class="btn icon-btn" onclick="togSq(\''+mid+'\',\''+uid+'\')">×</button>')+'</div>';
        });
      }
      if(notSel.length>0&&!isRO){
        h+='<div style="font-size:13px;font-weight:600;color:#555;margin:12px 0 8px">Available to add</div>';
        notSel.forEach(function(p){
          const av=getAv(mid,p.id);const dis=sq.length>=11;
          h+='<div class="add-row" '+(dis?'style="opacity:.4"':'onclick="togSq(\''+mid+'\',\''+p.id+'\')"')+'><div class="bnum"></div><div class="av-c">'+ini(p.name)+'</div><div class="p-name">'+p.name+syms(p,true)+'</div><span class="atag '+(av==='yes'?'tag-y':'tag-m')+'">'+( av==='yes'?'Available':'Maybe')+'</span><span style="font-size:12px;color:#1a5c2e;margin-left:auto">+ Add</span></div>';
        });
      }
      if(!avail.length)h+='<div style="text-align:center;color:#bbb;padding:24px;font-size:13px">No available players — check availability tab.</div>';
    }
  }
  else if(UI.tab===2){
    h+='<div class="sec">Manage matches</div><div class="sub">Changes notify all members.</div>';

      h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="pill '+(match.venue==='Home'?'home':'away')+'" style="margin:0">vs '+match.opponent+' · '+fmtD(match.date)+'</span>'+(isRO?'':'<button class="btn sm ghost-red" onclick="delM(\''+match.id+'\')">Remove</button>')+'</div>';
      if(!isRO){h+='<div class="mfrow"><input id="eo-'+match.id+'" value="'+match.opponent+'" placeholder="Opponent"><select id="ev-'+match.id+'"><option'+(match.venue==='Home'?' selected':'')+'>Home</option><option'+(match.venue==='Away'?' selected':'')+'>Away</option></select></div><div class="mfrow"><input type="date" id="ed-'+match.id+'" value="'+match.date+'"><input type="time" id="et-'+match.id+'" value="'+(match.time||'13:00')+'"></div><button class="btn primary full" style="margin-top:4px" onclick="saveM(\''+match.id+'\')">Save changes</button>';}

    });

  }
  else if(UI.tab===3){
    const notifs=DB.notifs.filter(n=>n.target==='manager'||n.target==='all');
    h+='<div class="sec">Notifications</div><div class="sub">Availability changes and match updates.</div>';
    if(!notifs.length)h+='<div style="color:#bbb;font-size:13px;text-align:center;padding:24px">No notifications yet.</div>';
    else{h+='<div class="card">';notifs.slice(0,40).forEach(n=>{const u=!n.read?.manager;h+='<div class="notif-row"><div class="ndot'+(u?'':' r')+'"></div><div style="flex:1"><div style="font-size:13px'+(u?';font-weight:600':'')+'">'+n.text+'</div><div style="font-size:11px;color:#bbb">'+ago(n.ts)+'</div></div></div>';});h+='</div>';}

  else if(UI.tab===4){
    h+='<div class="sec">Players</div>';

      h+='<div class="card" style="margin-bottom:14px">'
        +'<div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#1a5c2e">Add player</div>'
        +'<label>Full name</label>'
        +'<input id="ap-name" type="text" placeholder="First and last name" autocomplete="off" autocorrect="off" autocapitalize="words">'
        +'<label>Role</label>'
        +'<select id="ap-role"><option>member</option><option>manager</option></select>'

      h+='</div>';
    }
    h+='<div style="font-size:14px;font-weight:600;margin-bottom:8px">Active ('+allP().length+')</div><div class="card">';
    allP().forEach(function(p){h+='<div class="p-row"><div class="av-c">'+ini(p.name)+'</div><div class="p-name">'+p.name+syms(p,true)+'</div><span class="badge '+(p.role==='manager'?'badge-mgr':'badge-m')+'" style="margin-left:auto">'+(p.role==='manager'?'Manager':'Member')+'</span>'+(isRO?'':'<button class="btn sm ghost-red" style="margin-left:8px" onclick="removePlayer(\''+p.id+'\',\''+p.name+'\')" >Remove</button>')+'</div>';});

  else if(UI.tab===7){
    h+='<div class="sec">Help &amp; Guide</div>';
    h+='<div class="card">'
      +'<div style="font-size:14px;font-weight:600;color:#1a5c2e;margin-bottom:8px">📱 Install as an app</div>'
      +'<div style="font-size:13px;color:#555;line-height:1.6">'
      +'<b>iPhone/iPad:</b> Open this page in Safari, tap the Share button (box with arrow), scroll down and tap <b>Add to Home Screen</b>. The app will appear on your home screen like a native app.<br><br>'
      +'<b>Android:</b> Open in Chrome, tap the three-dot menu, tap <b>Add to Home Screen</b>.<br><br>'
      +'<b>Desktop Chrome:</b> Three-dot menu (⋮) → <b>Cast, save and share → Create shortcut</b> → click <b>Install</b>. The app opens in its own window like a native app.'
      +'</div></div>'
      +'<div class="card">'
      +'<div style="font-size:14px;font-weight:600;color:#1a5c2e;margin-bottom:8px">🚀 Getting started</div>'
      +'<div style="font-size:13px;color:#555;line-height:1.6">'
      +'1. <b>Add your players</b> — go to Players tab and use the Add Player form. Each player gets PIN 1000 and must change it on first login.<br><br>'
      +'2. <b>Add your fixtures</b> — go to Matches tab and add each game with opponent, date, time and home/away.<br><br>'
      +'3. <b>Share the app link</b> — send players: <span style="font-family:monospace;background:#f4f4f2;padding:2px 6px;border-radius:4px;font-size:12px">https://sandhurstcc.github.io/sandhurst-cc</span><br><br>'
      +'4. <b>Players log in</b> with their name and PIN 1000, then set a personal PIN.<br><br>'
      +'5. <b>Players mark availability</b> on the Availability screen for each match.'
      +'</div></div>'
      +'<div class="card">'
      +'<div style="font-size:14px;font-weight:600;color:#1a5c2e;margin-bottom:8px">📋 Manager tabs explained</div>'
      +'<div style="font-size:13px;color:#555;line-height:1.6">'
      +'<b>Availability</b> — See and override all player availability for each match. Stats show totals at a glance.<br><br>'
      +'<b>Team</b> — Select your XI from available players. Drag the ⠿ handle to set batting order. Only players who marked available or maybe are shown.<br><br>'
      +'<b>Matches</b> — Add, edit or remove fixtures. Changes send a notification to all players.<br><br>'
      +'<b>Notifications</b> — See all availability changes and match updates.<br><br>'
      +'<b>Players</b> — Add players directly, approve/reject self-registrations, view the full squad.<br><br>'
      +'<b>Export</b> — Download a full season spreadsheet (Excel) or a team sheet PDF for the selected match.<br><br>'
      +'<b>Settings</b> — Set how many days before a match availability locks, and when reminder notifications fire.'
      +'</div></div>';
  }
  else if(UI.tab===6){
    h+='<div class="sec">Settings</div><div class="sub">Changes apply immediately.</div>'
      +'<div class="card">'
      +'<div class="set-row"><div><div style="font-size:14px;font-weight:500">Availability reminder</div><div style="font-size:12px;color:#999">Push X days before match if no response</div></div><div style="display:flex;align-items:center;gap:6px"><input class="num-inp" type="number" id="s-r" min="1" max="14" value="'+DB.settings.reminderDays+'"><span style="font-size:13px;color:#888">days</span></div></div>'
      +'<div class="set-row"><div><div style="font-size:14px;font-weight:500">Availability lock</div><div style="font-size:12px;color:#999">Members locked X days before match</div></div><div style="display:flex;align-items:center;gap:6px"><input class="num-inp" type="number" id="s-l" min="1" max="10" value="'+DB.settings.lockDays+'"><span style="font-size:13px;color:#888">days</span></div></div>'
      +'<div class="set-row"><div><div style="font-size:14px;font-weight:500">Reminder time</div><div style="font-size:12px;color:#999">Time push fires</div></div><input type="time" id="s-t" value="'+DB.settings.reminderTime+'" style="width:100px;margin:0"></div>'
      +'<button class="btn primary full" style="margin-top:14px" onclick="saveSt()">Save settings</button>'
      +'</div>';
  }

  app.innerHTML=h;
  restoreMatchScroll();
  if((UI.tab===0||UI.tab===1)&&m.id)renderAvailList(mid);
}
