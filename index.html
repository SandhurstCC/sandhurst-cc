<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f4f4f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;color:#111}
#app{max-width:520px;margin:0 auto;padding:12px 14px 90px;min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:10px;border:1px solid #ccc;cursor:pointer;font-size:14px;font-weight:500;background:#fff;color:#333;transition:all .15s;-webkit-appearance:none;gap:6px;width:100%;margin-bottom:8px}
.btn:active{transform:scale(.97)}
.btn.primary{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.btn.blue{background:#185fa5;color:#fff;border-color:#185fa5}
.btn.red{background:#a32d2d;color:#fff;border-color:#a32d2d}
.btn.ghost-red{background:#fff;color:#a32d2d;border-color:#f09595}
.btn.sm{padding:5px 12px;font-size:12px;width:auto;margin:0}
.btn.inline{width:auto;margin:0}
.btn.icon-btn{background:none;border:none;color:#bbb;font-size:20px;padding:2px 6px;width:auto;margin:0}
input,select{width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:10px;color:#111;background:#fff;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#1a5c2e;box-shadow:0 0 0 3px rgba(26,92,46,.1)}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px;margin-bottom:4px}
.topbar-left{display:flex;align-items:center;gap:10px}
.club-name{font-size:16px;font-weight:700;color:#1a5c2e}
.role-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.rb-member{background:#e6f1fb;color:#185fa5}
.rb-manager{background:#d4eadc;color:#1a5c2e}
.rb-readonly{background:#faeeda;color:#854f0b}
.section-title{font-size:17px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#999;margin-bottom:14px}
.avatar{width:34px;height:34px;border-radius:50%;background:#d4eadc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1a5c2e;flex-shrink:0}
.avail-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.avail-row:last-child{border-bottom:none}
.pname{font-size:14px;font-weight:500;flex:1}
.tog{padding:5px 10px;border-radius:8px;border:1px solid #e0e0e0;cursor:pointer;font-size:12px;font-weight:600;color:#aaa;background:#fafafa;transition:all .15s;user-select:none}
.tog:active{transform:scale(.95)}
.tog.ay{background:#d4eadc;border-color:#9fd4a4;color:#1a5c2e}
.tog.an{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.tog.am{background:#faeeda;border-color:#fac775;color:#854f0b}
.match-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.match-scroll::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1.5px solid #ddd;cursor:pointer;font-size:12px;font-weight:500;color:#888;background:#fafafa;text-align:left;transition:all .15s;min-width:130px}
.mtab.home{border-left:4px solid #1a5c2e}
.mtab.away{border-left:4px solid #185fa5}
.mtab.active.home{background:#d4eadc;color:#1a5c2e;border-color:#9fd4a4;border-left-color:#1a5c2e}
.mtab.active.away{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4;border-left-color:#185fa5}
.match-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px}
.pill-home{background:#f4f9f4;color:#1a5c2e;border:1px solid #c8dfc8}
.pill-away{background:#e6f1fb;color:#185fa5;border:1px solid #b5d4f4}
.avail-tag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600;white-space:nowrap}
.tag-yes{background:#d4eadc;color:#1a5c2e}
.tag-no{background:#fcebeb;color:#a32d2d}
.tag-maybe{background:#faeeda;color:#854f0b}
.tag-none{background:#f0f0f0;color:#999}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:#f4f9f4;border-radius:10px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1a5c2e}
.stat-l{font-size:11px;color:#999;margin-top:2px}
.login-wrap{max-width:320px;margin:30px auto 0;padding:0 4px}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px}
.login-title{text-align:center;font-size:18px;font-weight:700;color:#1a5c2e;margin-bottom:3px}
.login-sub{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.login-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.error{color:#a32d2d;font-size:13px;margin:-4px 0 10px;text-align:center;padding:6px;background:#fcebeb;border-radius:8px}
.success{color:#1a5c2e;font-size:13px;margin:-4px 0 10px;text-align:center;padding:6px;background:#d4eadc;border-radius:8px}
.mgmt-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.mgmt-tabs::-webkit-scrollbar{display:none}
.mgtab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid #ddd;cursor:pointer;font-size:13px;font-weight:500;color:#888;background:#fafafa;position:relative}
.mgtab.active{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.nbadge{position:absolute;top:-5px;right:-5px;background:#e24b4a;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.bat-num{width:26px;height:26px;border-radius:50%;background:#e6f1fb;color:#185fa5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bat-num.filled{background:#1a5c2e;color:#fff}
.drag-handle{color:#ccc;font-size:18px;cursor:grab;padding:0 3px;flex-shrink:0;user-select:none}
.bat-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #c8dfc8;background:#f4f9f4;cursor:grab;user-select:none;touch-action:none}
.bat-row.drag-over{border-color:#1a5c2e;background:#e0f0e6;border-style:dashed}
.sel-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #eee;background:#fff;cursor:pointer;user-select:none}
.sel-row:active{background:#f8f8f8}
.badge-role{font-size:10px;padding:2px 7px;border-radius:6px;background:#f0f0f0;color:#888;margin-left:2px}
.lock-banner{background:#faeeda;border:1px solid #fac775;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#854f0b}
.locked-banner{background:#fcebeb;border:1px solid #f09595;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#a32d2d}
.info-banner{background:#e6f1fb;border:1px solid #b5d4f4;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#185fa5}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#1a5c2e}
.notif-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0;margin-top:4px}
.notif-dot.read{background:transparent}
.notif-text{font-size:13px;flex:1;color:#333}
.notif-time{font-size:11px;color:#bbb;flex-shrink:0;white-space:nowrap}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f5f5f5}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:#999;margin-top:2px}
.num-input{width:60px;text-align:center;margin:0;padding:6px 8px;font-size:14px}
.in-app-banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a5c2e;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:90vw;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}
.in-app-banner.show{opacity:1}
.pending-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.pending-row:last-child{border-bottom:none}
.pin-dots{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #1a5c2e;background:#fff;transition:background .15s}
.pin-dot.filled{background:#1a5c2e}
.match-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.divider{text-align:center;font-size:13px;color:#bbb;margin:4px 0 12px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#eee}
.divider::before{left:0} .divider::after{right:0}
</style>
</head>

// ── SIMPLE HASH (not cryptographic but stops plain-text storage) ──────────────
function hashPin(pin) {
  let h = 0;
  for (let i=0; i<pin.length; i++) { h = ((h<<5)-h)+pin.charCodeAt(i); h|=0; }
  return 'h' + Math.abs(h).toString(36);
}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function initFirebase() {
  if (!window._firebaseReady) { document.addEventListener('firebase-ready',initFirebase,{once:true}); return; }
  // Seed users if database is empty
  window._get(window._ref(window._db,'sandhurst/users')).then(snap => {
    if (!snap.val()) {
      const usersObj = {};
      SEED_USERS.forEach(u => { usersObj[u.id] = u; });
      window._set(window._ref(window._db,'sandhurst/users'), usersObj);
    }
  });
  window._get(window._ref(window._db,'sandhurst/matches')).then(snap => {
    if (!snap.val()) {
      const mObj = {};
      DEFAULT_MATCHES.forEach(m => { mObj[m.id]=m; });
      window._set(window._ref(window._db,'sandhurst/matches'), mObj);
    }
  });
  window._get(window._ref(window._db,'sandhurst/settings')).then(snap => {
    if (!snap.val()) window._set(window._ref(window._db,'sandhurst/settings'), DEFAULT_SETTINGS);
  });
  // Live listener
  window._onValue(window._ref(window._db,'sandhurst'), snap => {
    const data = snap.val()||{};
    if (data.users)        S.users        = data.users;
    if (data.matches)      S.matches      = data.matches;
    if (data.settings)     S.settings     = {...DEFAULT_SETTINGS,...data.settings};
    if (data.availability) S.availability = data.availability;
    if (data.squad)        S.squad        = data.squad;
    if (data.notifications)S.notifications= Object.values(data.notifications).sort((a,b)=>b.ts-a.ts);
    if (data.fcmTokens)    S.fcmTokens    = data.fcmTokens;
    S.lockHolder = data.lock?.holder||null;
    S.lockExpiry = data.lock?.expiry||null;
    S.syncLive   = true;
    // Refresh currentUser from db (name/pin may have changed)
    if (S.currentUser) {
      const fresh = S.users[S.currentUser.id];
      if (fresh) S.currentUser = fresh;
    }
    S.unreadNotifs = S.notifications.filter(n=>{
      if (!S.currentUser) return false;
      const key = S.currentUser.role==='member'?S.currentUser.id:'manager';
      const target = S.currentUser.role==='member'?'all':n.target;
      return !n.read?.[key] && (S.currentUser.role==='member'?(n.target==='all'||n.target===S.currentUser.id):(n.target==='manager'||n.target==='all'));
    }).length;
    render();
  });
}

const fbSet = async (path,val) => { if(!window._firebaseReady)return; await window._set(window._ref(window._db,path),val); };

async function addNotif(text,target,matchId,type) {
  const id='n'+Date.now();
  await fbSet(`sandhurst/notifications/${id}`,{id,ts:Date.now(),text,target,matchId:matchId||null,type:type||'info',read:{}});
}

async function markRead() {
  if (!S.currentUser) return;
  const key = S.currentUser.role==='member'?S.currentUser.id:'manager';
  const mine = S.notifications.filter(n=>{
    if (S.currentUser.role==='member') return (n.target==='all'||n.target===S.currentUser.id)&&!n.read?.[key];
    return (n.target==='manager')&&!n.read?.[key];
  });
  for (const n of mine) await fbSet(`sandhurst/notifications/${n.id}/read/${key}`,true);
}

window.doLogin = function() {
  const name = S.nameInput.trim().toLowerCase();
  const pin  = S.pinInput.trim();
  if (!name||!pin) { S.pinError='Enter your name and PIN.'; render(); return; }
  // Find user by name (case-insensitive)
  const user = Object.values(S.users).find(u => u.name.toLowerCase()===name && u.status==='active');
  if (!user) { S.pinError='Name not recognised. Check spelling or register below.'; render(); return; }
  if (user.pin !== hashPin(pin)) { S.pinError='Incorrect PIN.'; render(); return; }
  S.currentUser = {...user};
  S.pinError = '';
  S.nameInput = ''; S.pinInput = '';
  if (user.mustChange) { S.screen='changePin'; S.newPin=''; S.confirmPin=''; S.pinError=''; render(); return; }
  S.screen = user.role==='manager'||user.role==='readonly' ? 'manager' : 'member';
  render();
  setTimeout(()=>requestPush(),1500);
};

window.doChangePin = async function() {
  const np   = document.getElementById('change-pin-new')?.value?.trim() || '';
  const conf = document.getElementById('change-pin-conf')?.value?.trim() || '';
  if (np.length < 4) { S.pinError='PIN must be at least 4 digits.'; render(); return; }
  if (np !== conf) { S.pinError='PINs do not match.'; render(); return; }
  if (np==='1000') { S.pinError='Please choose a different PIN.'; render(); return; }
  // Capture everything we need before any async operations
  const uid  = S.currentUser?.id;
  const role = S.currentUser?.role;
  const name = S.currentUser?.name;
  if (!uid) { S.screen='login'; S.pinError=''; render(); return; }
  const hashed = hashPin(np);
  // Update local state immediately so Firebase re-renders don't break anything
  S.currentUser = {...S.currentUser, pin:hashed, mustChange:false};
  S.pinError='';
  S.screen = (role==='manager'||role==='readonly') ? 'manager' : 'member';
  render();
  showBanner('PIN set — welcome, ' + (name?.split(' ')[0]||'')+'!');
  // Save to Firebase in background
  fbSet(`sandhurst/users/${uid}/pin`, hashed);
  fbSet(`sandhurst/users/${uid}/mustChange`, false);
};

window.doExcel = function() {
  if(!window.XLSX){showBanner('Loading…');return;}
  const players=activePlayers();
  const matchList=Object.values(S.matches).sort((a,b)=>a.date.localeCompare(b.date));
  const header=['Player',...matchList.map(m=>`${m.opponent}\n${fmtDate(m.date)}`),'Played','Available','Unavailable'];
  const rows=[header];
  players.forEach(p=>{
    const cells=matchList.map(m=>{
      if(getSquad(m.id).includes(p.id))return'Played';
      const av=getAvail(m.id,p.id);
      return av==='yes'?'Available':av==='maybe'?'Maybe':av==='no'?'Unavailable':'-';
    });
    rows.push([p.name,...cells,
      matchList.filter(m=>getSquad(m.id).includes(p.id)).length,
      matchList.filter(m=>['yes','maybe'].includes(getAvail(m.id,p.id))).length,
      matchList.filter(m=>getAvail(m.id,p.id)==='no').length
    ]);
  });
  rows.push([],['Totals',...matchList.map(m=>getSquad(m.id).length+' played'),'','','']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:20},...matchList.map(()=>({wch:18})),{wch:8},{wch:10},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Season Overview');
  XLSX.writeFile(wb,'SandhurstCC_Season.xlsx');
};

    doc.text('Sandhurst Cricket Club',40,18);
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80,80,80);
    doc.text(`vs ${match.opponent}  ·  ${fmtDate(match.date)} ${match.time||''}  ·  ${match.venue}`,40,26);
    doc.text(`Generated: ${new Date().toLocaleDateString('en-GB')}`,40,32);
    doc.setDrawColor(26,92,46);doc.setLineWidth(0.5);doc.line(14,36,pw-14,36);
    let y=48;
    doc.setFillColor(26,92,46);doc.rect(14,y-7,pw-28,9,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text('#',16,y);doc.text('Player',26,y);doc.text('Role',110,y);doc.text('Notes',155,y);
    y+=11;
    if(sq.length===0){
      doc.setTextColor(180,180,180);doc.setFont('helvetica','normal');
      doc.text('No players selected yet.',16,y+6);
    } else {
      sq.forEach((uid,i)=>{
        const p=S.users[uid];if(!p)return;
        if(i%2===0){doc.setFillColor(244,249,244);doc.rect(14,y-6,pw-28,10,'F');}
        doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(9);
        doc.text(String(i+1),16,y);doc.text(p.name,26,y);
        const notes=[];if(p.captain)notes.push('Captain');if(p.keeper)notes.push('Wicketkeeper');
        if(notes.length)doc.text(notes.join(' · '),155,y);
        y+=10;
      });
    }
    doc.setDrawColor(26,92,46);doc.line(14,y+4,pw-14,y+4);
    doc.setTextColor(180,180,180);doc.setFontSize(8);
    doc.text('Sandhurst Cricket Club · Est. 1949 · Kent',pw/2,ph-8,{align:'center'});
    doc.save(`SandhurstCC_vs_${match.opponent.replace(/\s/g,'_')}.pdf`);
  };
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  const screens={login:renderLogin,changePin:renderChangePin,register:renderRegister,pending:renderPending,member:renderMember,manager:renderManager};
  (screens[S.screen]||renderLogin)(app);
}

const logoImg = size=>`<img src="${LOGO}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0">`;

function topbar(role) {
  const badges={manager:'rb-manager',readonly:'rb-readonly',member:'rb-member'};
  const labels={manager:'Manager',readonly:'Read-only',member:'Member'};
  return `<div class="topbar">
    <div class="topbar-left">${logoImg(36)}<span class="club-name">Sandhurst CC</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-dot${S.syncLive?' live':''}"></div>
      <span style="font-size:12px;color:#888;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${S.currentUser?.name||''}</span>
      <span class="role-badge ${badges[role]}">${labels[role]}</span>
      <button class="btn sm inline" onclick="doLogout()">Out</button>
    </div>
  </div>`;
}

function matchTabs() {
  const matchList=Object.values(S.matches).sort((a,b)=>a.date.localeCompare(b.date));
  if(matchList.length===0) return '<div style="color:#bbb;font-size:13px;margin-bottom:14px">No matches yet.</div>';
  return `<div class="match-scroll">${matchList.map(m=>{
    const cls=m.venue==='Home'?'home':'away';
    const act=S.activeMatch===m.id?'active':'';
    const days=daysUntil(m.id); const locked=isLocked(m.id);
    return `<button class="mtab ${cls} ${act}" onclick="setMatch('${m.id}')">
      <div style="font-weight:600;font-size:13px">${m.opponent}</div>
      <div style="font-size:11px;opacity:.75;margin-top:2px">${fmtDate(m.date)}${m.time?' '+m.time:''}</div>
      ${locked?`<div style="font-size:10px;color:#a32d2d;margin-top:1px">🔒 Locked</div>`:days>0&&days<=S.settings.reminderDays?`<div style="font-size:10px;color:#854f0b;margin-top:1px">${days}d away</div>`:''}
    </button>`;
  }).join('')}</div>`;
}
window.setMatch = id=>{S.activeMatch=id;render();};
window.setMgmtTab = async function(i){S.mgmtTab=i;if(i===3)await markRead();render();};

function syms(u,mgr){if(!mgr)return'';return(u.captain?'<span style="font-size:13px">🛡</span>':'')+(u.keeper?'<span style="font-size:13px">🧤</span>':'');}

// ── MEMBER SCREEN ─────────────────────────────────────────────────────────────
function renderMember(app) {
  const mid=S.activeMatch; const match=getMatch(mid);
  const pillCls=match.venue==='Home'?'pill-home':'pill-away';
  const locked=isLocked(mid); const days=daysUntil(mid);
  const myNotifs=S.notifications.filter(n=>n.target==='all'||n.target===S.currentUser.id);
  const unread=myNotifs.filter(n=>!n.read?.[S.currentUser.id]).length;
  const players=activePlayers();
  let h=topbar('member');
  if(days>0&&days<=S.settings.reminderDays&&getAvail(mid,S.currentUser.id)==='none'){
    h+=`<div class="lock-banner">⏰ Please mark your availability for vs ${match.opponent} — ${days} day${days===1?'':'s'} to go!</div>`;
  }
  h+=`<div class="section-title">My availability</div><div class="sub">Only your own row is editable.</div>`;
  h+=matchTabs();
  if(match.id){
    h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
    if(locked) h+=`<div class="locked-banner">🔒 Availability locked ${S.settings.lockDays} days before the match. Contact a manager to change.</div>`;
    h+=`<div class="card">`;
    players.forEach(p=>{
      const av=getAvail(mid,p.id); const me=p.id===S.currentUser.id; const canEdit=me&&!locked;
      h+=`<div class="avail-row" style="${!me?'opacity:.35;pointer-events:none':''}">
        <div class="avatar" style="${me?'background:#1a5c2e;color:#fff':''}">${ini(p.name)}</div>
        <div class="pname">${p.name}</div>
        ${canEdit?`<div style="display:flex;gap:5px">
          <div class="tog${av==='yes'?' ay':''}" onclick="setAvailFn('${mid}','${p.id}','yes')">Yes</div>
          <div class="tog${av==='maybe'?' am':''}" onclick="setAvailFn('${mid}','${p.id}','maybe')">Maybe</div>
          <div class="tog${av==='no'?' an':''}" onclick="setAvailFn('${mid}','${p.id}','no')">No</div>
        </div>`:`<span class="avail-tag ${av==='yes'?'tag-yes':av==='no'?'tag-no':av==='maybe'?'tag-maybe':'tag-none'}">${av==='yes'?'Available':av==='no'?'Unavailable':av==='maybe'?'Maybe':'Not set'}</span>`}
      </div>`;
    });
    h+=`</div>`;
  }
  // Profile
  h+=`<div class="section-title" style="margin-top:4px">My profile</div>`;
  h+=`<div class="card">
    <div style="font-size:13px;color:#888;margin-bottom:10px">Change your name or PIN</div>
    <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Display name</label>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="new-name-inp" value="${S.currentUser.name}" style="margin:0;flex:1">
      <button class="btn primary inline" onclick="saveNewName()">Save</button>
    </div>
    <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Change PIN</label>
    <input id="curr-pin-inp" type="password" placeholder="Current PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
    <input id="new-pin-inp" type="password" placeholder="New PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
    <input id="conf-pin-inp" type="password" placeholder="Confirm new PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
    <button class="btn primary" onclick="saveNewPin()">Change PIN</button>
  </div>`;
  // Notifications
  h+=`<div class="section-title" style="margin-top:4px">Notifications${unread>0?` <span style="font-size:13px;font-weight:400;color:#e24b4a">(${unread} new)</span>`:''}</div>`;
  if(myNotifs.length===0){
    h+=`<div style="color:#bbb;font-size:13px;text-align:center;padding:16px">No notifications yet.</div>`;
  } else {
    h+=`<div class="card">`;
    myNotifs.slice(0,10).forEach(n=>{
      const unr=!n.read?.[S.currentUser.id];
      h+=`<div class="notif-item">
        <div class="notif-dot${unr?'':' read'}"></div>
        <div class="notif-text" style="${unr?'font-weight:600':''}">${n.text}</div>
        <div class="notif-time">${timeAgo(n.ts)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  app.innerHTML=h;
  setTimeout(()=>markRead(),1000);
}

// ── MANAGER SCREEN ────────────────────────────────────────────────────────────
function renderManager(app) {
  const mid=S.activeMatch; const match=getMatch(mid);
  const pillCls=match?.venue==='Home'?'pill-home':'pill-away';
  const isRO=S.currentUser?.role==='readonly';
  const pending=pendingPlayers();
  const tabs=['Availability','Team','Matches','Notifications','Players','Export','Settings'];
  let h=topbar(S.currentUser?.role||'manager');
  if(!isRO&&S.lockHolder&&!iAmLock()&&Date.now()<(S.lockExpiry||0)){
    h+=`<div class="lock-banner">🔒 Another manager is editing team selection.</div>`;
  }
  h+=`<div class="mgmt-tabs">${tabs.map((t,i)=>{
    const badge=(i===3&&S.unreadNotifs>0)?`<span class="nbadge">${S.unreadNotifs}</span>`:(i===4&&pending.length>0)?`<span class="nbadge">${pending.length}</span>`:'';
    return `<button class="mgtab${S.mgmtTab===i?' active':''}" onclick="setMgmtTab(${i})">${t}${badge}</button>`;
  }).join('')}</div>`;

  // TAB 0 — AVAILABILITY
  if(S.mgmtTab===0){
    const players=activePlayers();
    h+=`<div class="section-title">Availability</div>`;
    h+=matchTabs();
    if(match?.id){
      h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
      if(isLocked(mid)) h+=`<div class="locked-banner">🔒 Availability locked for members. You can still override below.</div>`;
      h+=`<div class="stats-row">
        <div class="stat-box"><div class="stat-n">${availCount(mid,'yes')}</div><div class="stat-l">Available</div></div>
        <div class="stat-box"><div class="stat-n">${availCount(mid,'maybe')}</div><div class="stat-l">Maybe</div></div>
        <div class="stat-box"><div class="stat-n">${availCount(mid,'no')}</div><div class="stat-l">Unavailable</div></div>
        <div class="stat-box"><div class="stat-n">${availCount(mid,'none')}</div><div class="stat-l">No response</div></div>
      </div>`;
      h+=`<div class="card">`;
      players.forEach(p=>{
        const av=getAvail(mid,p.id);
        const tCls={yes:'tag-yes',no:'tag-no',maybe:'tag-maybe',none:'tag-none'}[av];
        const tLbl={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'No response'}[av];
        h+=`<div class="avail-row">
          <div class="avatar">${ini(p.name)}</div>
          <div class="pname">${p.name}${syms(p,true)}</div>
          <span class="avail-tag ${tCls}" style="margin-right:6px">${tLbl}</span>
          ${!isRO?`<div style="display:flex;gap:3px">
            <div class="tog${av==='yes'?' ay':''}" onclick="setAvailFn('${mid}','${p.id}','yes')">Y</div>
            <div class="tog${av==='maybe'?' am':''}" onclick="setAvailFn('${mid}','${p.id}','maybe')">M</div>
            <div class="tog${av==='no'?' an':''}" onclick="setAvailFn('${mid}','${p.id}','no')">N</div>
          </div>`:''}
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // TAB 1 — TEAM SELECTION
  else if(S.mgmtTab===1){
    const sq=getSquad(mid);
    const canEdit=!isRO&&(iAmLock()||!S.lockHolder||Date.now()>(S.lockExpiry||0));
    const availP=activePlayers().filter(p=>['yes','maybe'].includes(getAvail(mid,p.id)));
    const notSel=availP.filter(p=>!sq.includes(p.id));
    h+=`<div class="section-title">Team selection</div>`;
    h+=matchTabs();
    if(match?.id){
      h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
      h+=`<div class="stats-row">
        <div class="stat-box"><div class="stat-n">${sq.length}</div><div class="stat-l">Selected</div></div>
        <div class="stat-box"><div class="stat-n">${Math.max(0,11-sq.length)}</div><div class="stat-l">Spots left</div></div>
        <div class="stat-box"><div class="stat-n">${availP.length}</div><div class="stat-l">Available</div></div>
      </div>`;
      if(sq.length>0){
        h+=`<div style="font-size:13px;font-weight:600;color:#1a5c2e;margin-bottom:8px">Batting order${canEdit?' <span style="font-weight:400;color:#bbb;font-size:11px">— drag to reorder</span>':''}</div>`;
        sq.forEach((uid,i)=>{
          const p=S.users[uid];if(!p)return;
          const av=getAvail(mid,uid);
          const da=canEdit?`draggable="true" data-uid="${uid}" ondragstart="dStart(event,'${uid}')" ondragover="dOver(event)" ondragenter="dEnter(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${mid}')" ondragend="dEnd()" ontouchstart="touchStart(event,'${uid}','${mid}')" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)"`:'' ;
          h+=`<div class="bat-row" ${da}>
            ${canEdit?`<span class="drag-handle">⠿</span>`:''}
            <div class="bat-num filled">${i+1}</div>
            <div class="avatar" style="background:#1a5c2e;color:#fff">${ini(p.name)}</div>
            <div class="pname">${p.name}${syms(p,true)}</div>
            <span class="avail-tag ${av==='yes'?'tag-yes':'tag-maybe'}" style="margin-right:4px">${av==='yes'?'Avail':'Maybe'}</span>
            ${canEdit?`<button class="btn icon-btn" onclick="toggleSquadFn('${mid}','${uid}')">×</button>`:''}
          </div>`;
        });
      }
      if(notSel.length>0&&canEdit){
        h+=`<div style="font-size:13px;font-weight:600;color:#555;margin:12px 0 8px">Available to add</div>`;
        notSel.forEach(p=>{
          const av=getAvail(mid,p.id); const dis=sq.length>=11;
          h+=`<div class="sel-row" onclick="${dis?'':'toggleSquadFn(\''+mid+'\',\''+p.id+'\')'}" style="${dis?'opacity:.4;cursor:not-allowed':''}">
            <div class="bat-num"></div>
            <div class="avatar">${ini(p.name)}</div>
            <div class="pname">${p.name}${syms(p,true)}</div>
            <span class="avail-tag ${av==='yes'?'tag-yes':'tag-maybe'}">${av==='yes'?'Available':'Maybe'}</span>
            <span style="font-size:12px;color:#1a5c2e;margin-left:auto">+ Add</span>
          </div>`;
        });
      }
      if(availP.length===0) h+=`<div style="text-align:center;color:#bbb;padding:24px;font-size:13px">No available players — check availability tab first.</div>`;
    }
  }

  // TAB 2 — MATCHES
  else if(S.mgmtTab===2){
    h+=`<div class="section-title">Manage matches</div><div class="sub">Saving changes notifies all members.</div>`;
    const matchList=Object.values(S.matches).sort((a,b)=>a.date.localeCompare(b.date));
    matchList.forEach(m=>{
      const pc=m.venue==='Home'?'pill-home':'pill-away';
      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span class="match-pill ${pc}" style="margin:0">vs ${m.opponent} · ${fmtDate(m.date)}</span>
          ${!isRO?`<button class="btn sm ghost-red inline" onclick="deleteMatch('${m.id}')">Remove</button>`:''}
        </div>`;
      if(!isRO){
        h+=`<div class="match-form-row">
          <input id="edit-opp-${m.id}" value="${m.opponent}" placeholder="Opponent">
          <select id="edit-venue-${m.id}"><option${m.venue==='Home'?' selected':''}>Home</option><option${m.venue==='Away'?' selected':''}>Away</option></select>
        </div>
        <div class="match-form-row">
          <input type="date" id="edit-date-${m.id}" value="${m.date}">
          <input type="time" id="edit-time-${m.id}" value="${m.time||'13:00'}">
        </div>
        <button class="btn primary" style="margin-top:4px" onclick="saveMatch('${m.id}')">Save changes</button>`;
      } else {
        h+=`<div style="font-size:13px;color:#888">${fmtDate(m.date)} at ${m.time||'13:00'} · ${m.venue}</div>`;
      }
      h+=`</div>`;
    });
    if(!isRO){
      h+=`<div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#1a5c2e">Add new match</div>
        <div class="match-form-row">
          <input id="new-opp" placeholder="Opponent">
          <select id="new-venue"><option>Home</option><option>Away</option></select>
        </div>
        <div class="match-form-row">
          <input type="date" id="new-date">
          <input type="time" id="new-time" value="13:00">
        </div>
        <button class="btn primary" style="margin-top:4px" onclick="addMatch()">+ Add match</button>
      </div>`;
    }
  }

  // TAB 3 — NOTIFICATIONS
  else if(S.mgmtTab===3){
    const mgNotifs=S.notifications.filter(n=>n.target==='manager'||n.target==='all');
    h+=`<div class="section-title">Notifications</div><div class="sub">Availability changes and match updates.</div>`;
    if(mgNotifs.length===0){
      h+=`<div style="color:#bbb;font-size:13px;text-align:center;padding:24px">No notifications yet.</div>`;
    } else {
      h+=`<div class="card">`;
      mgNotifs.slice(0,40).forEach(n=>{
        const unr=!n.read?.manager;
        h+=`<div class="notif-item">
          <div class="notif-dot${unr?'':' read'}"></div>
          <div style="flex:1"><div class="notif-text" style="${unr?'font-weight:600':''}">${n.text}</div><div class="notif-time">${timeAgo(n.ts)}</div></div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // TAB 4 — PLAYERS
  else if(S.mgmtTab===4){
    h+=`<div class="section-title">Players</div>`;
    if(pending.length>0){
      h+=`<div style="font-size:14px;font-weight:600;color:#a32d2d;margin-bottom:8px">Pending approval (${pending.length})</div>`;
      h+=`<div class="card">`;
      pending.forEach(p=>{
        h+=`<div class="pending-row">
          <div class="avatar" style="background:#faeeda;color:#854f0b">${ini(p.name)}</div>
          <div class="pname">${p.name}</div>
          <button class="btn primary sm inline" style="margin-right:6px" onclick="approvePlayer('${p.id}')">Approve</button>
          <button class="btn ghost-red sm inline" onclick="rejectPlayer('${p.id}')">Reject</button>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`<div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">Active players (${activePlayers().length})</div>`;
    h+=`<div class="card">`;
    activePlayers().forEach(p=>{
      h+=`<div class="avail-row">
        <div class="avatar">${ini(p.name)}</div>
        <div class="pname">${p.name}${syms(p,true)}</div>
        <span class="role-badge ${p.role==='manager'?'rb-manager':'rb-member'}" style="margin-right:6px">${p.role==='manager'?'Manager':'Member'}</span>
      </div>`;
    });
    h+=`</div>`;
    // Profile section for manager themselves
    h+=`<div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">My profile</div>`;
    h+=`<div class="card">
      <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Display name</label>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="new-name-inp" value="${S.currentUser?.name||''}" style="margin:0;flex:1">
        <button class="btn primary inline" onclick="saveNewName()">Save</button>
      </div>
      <label style="font-size:13px;color:#888;display:block;margin-bottom:4px">Change PIN</label>
      <input id="curr-pin-inp" type="password" placeholder="Current PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
      <input id="new-pin-inp" type="password" placeholder="New PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
      <input id="conf-pin-inp" type="password" placeholder="Confirm new PIN" inputmode="numeric" style="letter-spacing:3px;text-align:center">
      <button class="btn primary" onclick="saveNewPin()">Change PIN</button>
    </div>`;
  }

  // TAB 5 — EXPORT
  else if(S.mgmtTab===5){
    h+=`<div class="section-title">Export</div>`;
    h+=matchTabs();
    if(match?.id){
      h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
    }
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn primary inline" onclick="doExcel()">Season Excel</button>
      <button class="btn blue inline" onclick="doPDF('${mid}')">Team PDF</button>
    </div>
    <div style="font-size:12px;color:#aaa">Excel: all players × all matches, single sheet with totals.<br>PDF: selected XI with batting order, captain &amp; keeper, club watermark.</div>`;
  }

  // TAB 6 — SETTINGS
  else if(S.mgmtTab===6){
    h+=`<div class="section-title">Settings</div><div class="sub">Changes apply to all users immediately.</div>`;
    h+=`<div class="card">
      <div class="settings-row">
        <div><div class="settings-label">Availability reminder</div><div class="settings-sub">Push sent to members X days before match if no response</div></div>
        <div style="display:flex;align-items:center;gap:6px"><input class="num-input" type="number" id="set-reminder" min="1" max="14" value="${S.settings.reminderDays}"><span style="font-size:13px;color:#888">days</span></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Availability lock</div><div class="settings-sub">Members cannot change X days before match</div></div>
        <div style="display:flex;align-items:center;gap:6px"><input class="num-input" type="number" id="set-lock" min="1" max="10" value="${S.settings.lockDays}"><span style="font-size:13px;color:#888">days</span></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Reminder time</div><div class="settings-sub">Time of day the push reminder fires</div></div>
        <input type="time" id="set-time" value="${S.settings.reminderTime}" style="width:100px;margin:0">
      </div>
      <button class="btn primary" style="margin-top:14px" onclick="saveSettings()">Save settings</button>
    </div>`;
  }

  app.innerHTML=h;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  initFirebase(); render();
  setInterval(()=>{if(iAmLock())fbSet('sandhurst/lock',{holder:S.currentUser.id,expiry:Date.now()+LOCK_TTL});},60000);
  window.addEventListener('beforeunload',()=>{if(iAmLock())releaseLock();});
});
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
