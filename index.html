// ── REPLACE WITH YOUR FIREBASE CONFIG ────────────────────────────────────────

  const messaging = getMessaging(app);

  onMessage(messaging, payload => {

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f4f4f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;color:#111}
#app{max-width:520px;margin:0 auto;padding:12px 14px 90px;min-height:100vh}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:10px;border:1px solid #ccc;cursor:pointer;font-size:14px;font-weight:500;background:#fff;color:#333;transition:all .15s;-webkit-appearance:none;gap:6px}
.btn:active{transform:scale(.97)}
.btn.primary{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.btn.blue{background:#185fa5;color:#fff;border-color:#185fa5}
.btn.red{background:#a32d2d;color:#fff;border-color:#a32d2d}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost{background:none;border:none;color:#bbb;font-size:20px;padding:2px 6px}
.btn.full{width:100%;margin-bottom:8px}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:10px;color:#111;background:#fff;-webkit-appearance:none}
input[type=time]{font-size:15px}
input:focus,select:focus{outline:none;border-color:#1a5c2e;box-shadow:0 0 0 3px rgba(26,92,46,.1)}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 14px;margin-bottom:4px}
.topbar-left{display:flex;align-items:center;gap:10px}
.club-name{font-size:16px;font-weight:700;color:#1a5c2e}
.role-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.rb-member{background:#e6f1fb;color:#185fa5}
.rb-manager{background:#d4eadc;color:#1a5c2e}
.rb-readonly{background:#faeeda;color:#854f0b}
.section-title{font-size:17px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#999;margin-bottom:14px}
.avatar{width:34px;height:34px;border-radius:50%;background:#d4eadc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1a5c2e;flex-shrink:0}
.avail-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.avail-row:last-child{border-bottom:none}
.pname{font-size:14px;font-weight:500;flex:1}
.tog{padding:5px 10px;border-radius:8px;border:1px solid #e0e0e0;cursor:pointer;font-size:12px;font-weight:600;color:#aaa;background:#fafafa;transition:all .15s;user-select:none}
.tog:active{transform:scale(.95)}
.tog.ay{background:#d4eadc;border-color:#9fd4a4;color:#1a5c2e}
.tog.an{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.tog.am{background:#faeeda;border-color:#fac775;color:#854f0b}
.match-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.match-scroll::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1.5px solid #ddd;cursor:pointer;font-size:12px;font-weight:500;color:#888;background:#fafafa;text-align:left;transition:all .15s;min-width:130px}
.mtab.home{border-left:4px solid #1a5c2e}
.mtab.away{border-left:4px solid #185fa5}
.mtab.active.home{background:#d4eadc;color:#1a5c2e;border-color:#9fd4a4;border-left-color:#1a5c2e}
.mtab.active.away{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4;border-left-color:#185fa5}
.match-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px}
.pill-home{background:#f4f9f4;color:#1a5c2e;border:1px solid #c8dfc8}
.pill-away{background:#e6f1fb;color:#185fa5;border:1px solid #b5d4f4}
.avail-tag{font-size:11px;padding:3px 9px;border-radius:8px;font-weight:600;white-space:nowrap}
.tag-yes{background:#d4eadc;color:#1a5c2e}
.tag-no{background:#fcebeb;color:#a32d2d}
.tag-maybe{background:#faeeda;color:#854f0b}
.tag-none{background:#f0f0f0;color:#999}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:#f4f9f4;border-radius:10px;padding:10px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1a5c2e}
.stat-l{font-size:11px;color:#999;margin-top:2px}
.login-wrap{max-width:320px;margin:40px auto 0;padding:0 4px}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px}
.login-title{text-align:center;font-size:18px;font-weight:700;color:#1a5c2e;margin-bottom:3px}
.login-sub{text-align:center;font-size:13px;color:#999;margin-bottom:20px}
.login-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.error{color:#a32d2d;font-size:13px;margin:-6px 0 10px;text-align:center}
.mgmt-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.mgmt-tabs::-webkit-scrollbar{display:none}
.mgtab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid #ddd;cursor:pointer;font-size:13px;font-weight:500;color:#888;background:#fafafa;position:relative}
.mgtab.active{background:#1a5c2e;color:#fff;border-color:#1a5c2e}
.nbadge{position:absolute;top:-5px;right:-5px;background:#e24b4a;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.bat-num{width:26px;height:26px;border-radius:50%;background:#e6f1fb;color:#185fa5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bat-num.filled{background:#1a5c2e;color:#fff}
.drag-handle{color:#ccc;font-size:18px;cursor:grab;padding:0 3px;flex-shrink:0;user-select:none}
.bat-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #c8dfc8;background:#f4f9f4;cursor:grab;user-select:none;touch-action:none}
.bat-row.drag-over{border-color:#1a5c2e;background:#e0f0e6;border-style:dashed}
.sel-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:6px;border:1px solid #eee;background:#fff;cursor:pointer;user-select:none}
.sel-row:active{background:#f8f8f8}
.badge-role{font-size:10px;padding:2px 7px;border-radius:6px;background:#f0f0f0;color:#888;margin-left:2px}
.export-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.lock-banner{background:#faeeda;border:1px solid #fac775;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#854f0b;display:flex;align-items:center;gap:8px}
.locked-banner{background:#fcebeb;border:1px solid #f09595;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#a32d2d;display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#1a5c2e}
.notif-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.notif-item:last-child{border-bottom:none}
.notif-item.unread .notif-text{font-weight:600}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0;margin-top:5px}
.notif-dot.read{background:transparent}
.notif-text{font-size:13px;flex:1;color:#333}
.notif-time{font-size:11px;color:#bbb;flex-shrink:0;margin-top:2px}
.hint{font-size:12px;color:#bbb;text-align:center;margin-top:10px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:#999;margin-top:2px}
.settings-val{display:flex;align-items:center;gap:8px}
.num-input{width:56px;text-align:center;margin:0;padding:6px 8px;font-size:14px}
.in-app-banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a5c2e;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:340px;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}
.in-app-banner.show{opacity:1}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;color:#aaa;font-size:10px;font-weight:500;border-radius:8px;position:relative;min-width:56px}
.nav-item.active{color:#1a5c2e}
.nav-icon{font-size:22px;line-height:1}
.match-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>

  reminderDays: 6,      // push reminder X days before match
  lockDays: 3,          // availability locks X days before match
  reminderTime: '12:00' // time of day for reminder (used by cloud function)
};

const MANAGER_PIN = '9999';
const MANAGER_RO_PIN = '8888';
const LOCK_TTL = 300000;

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {
  screen:'login', loginType:'member', pinInput:'', loginError:'',
  userRole:null, playerId:null, playerName:'',
  activeMatch:'m1', mgmtTab:0,
  // from Firebase:
  players: DEFAULT_PLAYERS,
  matches: DEFAULT_MATCHES,
  settings: DEFAULT_SETTINGS,
  availability:{}, squad:{},
  notifications:[],   // [{id,ts,text,matchId,type,read}]
  fcmTokens:{},       // {playerId: fcmToken}
  lockHolder:null, lockExpiry:null,
  syncLive:false,
  unreadNotifs:0,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const ini    = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtDate= d => { if(!d) return ''; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
const fmtTime= t => t || '';
const getMatch  = id => S.matches.find(m=>m.id===id) || S.matches[0];
const getAvail  = (mid,pid) => (S.availability[mid]||{})[pid] || 'none';
const getSquad  = mid => S.squad[mid] || [];
const availCount= (mid,val) => S.players.filter(p=>getAvail(mid,p.id)===val).length;
const iAmLock   = () => S.lockHolder && S.lockHolder===S.playerName && Date.now()<(S.lockExpiry||0);

// Is availability locked for this match?
function isAvailLocked(mid) {
  const m = getMatch(mid);
  if (!m || !m.date) return false;
  const matchDate = new Date(m.date + 'T' + (m.time||'13:00'));
  const lockDate  = new Date(matchDate.getTime() - S.settings.lockDays * 86400000);
  return Date.now() >= lockDate.getTime();
}

// Days until match
function daysUntil(mid) {
  const m = getMatch(mid);
  if (!m || !m.date) return 999;
  const matchDate = new Date(m.date + 'T12:00:00');
  return Math.ceil((matchDate - Date.now()) / 86400000);
}

// ── IN-APP BANNER ─────────────────────────────────────────────────────────────
function showInAppBanner(title, body) {
  const el = document.getElementById('in-app-banner');
  el.textContent = title + (body ? ' — ' + body : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
window.showInAppBanner = showInAppBanner;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function initFirebase() {
  if (!window._firebaseReady) { document.addEventListener('firebase-ready', initFirebase, {once:true}); return; }
  const db = window._db;
  window._onValue(window._ref(db, 'sandhurst'), snap => {
    const data = snap.val() || {};
    if (data.players)      S.players      = Object.values(data.players);
    if (data.matches)      S.matches      = Object.values(data.matches);
    if (data.settings)     S.settings     = {...DEFAULT_SETTINGS, ...data.settings};
    if (data.availability) S.availability = data.availability;
    if (data.squad)        S.squad        = data.squad;
    if (data.notifications)S.notifications= Object.values(data.notifications).sort((a,b)=>b.ts-a.ts);
    if (data.fcmTokens)    S.fcmTokens    = data.fcmTokens;
    S.lockHolder = data.lock?.holder || null;
    S.lockExpiry = data.lock?.expiry || null;
    S.syncLive   = true;
    // Count unread notifs for this user
    S.unreadNotifs = S.notifications.filter(n => {
      if (S.userRole==='member') return !n.read?.[S.playerId] && (n.target==='all' || n.target===S.playerId);
      if (S.userRole==='manager'||S.userRole==='readonly') return !n.read?.manager && n.target==='manager';
      return false;
    }).length;
    render();
  });
}

const fbSet = async (path, val) => {
  if (!window._firebaseReady) return;
  await window._set(window._ref(window._db, path), val);
};

// ── PUSH TOKEN ────────────────────────────────────────────────────────────────
async function requestPushPermission() {
  if (!window._messaging || !S.playerId) return;
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;
    const { getToken } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js");
    const token = await getToken(window._messaging, { vapidKey: window._vapidKey });
    if (token) await fbSet(`sandhurst/fcmTokens/${S.playerId}`, token);
  } catch(e) { console.log('Push permission:', e); }
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
async function addNotification(text, target, matchId, type) {
  const id = 'n' + Date.now();
  await fbSet(`sandhurst/notifications/${id}`, { id, ts: Date.now(), text, target, matchId: matchId||null, type: type||'info', read:{} });
}

async function markNotifsRead() {
  const key = (S.userRole==='member') ? S.playerId : 'manager';
  const myNotifs = S.notifications.filter(n =>
    (S.userRole==='member' ? n.target==='all'||n.target===S.playerId : n.target==='manager') && !n.read?.[key]
  );
  for (const n of myNotifs) {
    await fbSet(`sandhurst/notifications/${n.id}/read/${key}`, true);
  }
}

// ── LOCK ──────────────────────────────────────────────────────────────────────
async function acquireLock() {
  const now = Date.now();
  if (!S.lockHolder || now > (S.lockExpiry||0)) {
    await fbSet('sandhurst/lock', { holder: S.playerName, expiry: now + LOCK_TTL });
    return true;
  }
  return false;
}
async function releaseLock() { if (iAmLock()) await fbSet('sandhurst/lock', null); }

// ── AUTH ──────────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  if (S.loginType==='manager') {
    if (S.pinInput===MANAGER_PIN) {
      S.userRole='manager'; S.screen='manager'; S.playerName='Manager'; S.mgmtTab=0;
    } else if (S.pinInput===MANAGER_RO_PIN) {
      S.userRole='readonly'; S.screen='manager'; S.playerName='Read-only'; S.mgmtTab=0;
    } else { S.loginError='Incorrect PIN.'; render(); return; }
    S.loginError=''; S.pinInput=''; render(); return;
  }
  const found = S.players.find(p=>p.pin===S.pinInput);
  if (found) {
    S.userRole='member'; S.playerId=found.id; S.playerName=found.name;
    S.screen='member'; S.loginError=''; S.pinInput='';
    render();
    setTimeout(() => requestPushPermission(), 1500);
  } else { S.loginError='PIN not recognised.'; render(); }
};
window.doLogout = async function() {
  await releaseLock();
  S.screen='login'; S.userRole=null; S.playerId=null; S.playerName='';
  S.loginType='member'; S.pinInput=''; render();
};
window.setLoginType = t => { S.loginType=t; S.pinInput=''; S.loginError=''; render(); };
window.setMatch     = id => { S.activeMatch=id; render(); };
window.setMgmtTab   = async function(i) {
  S.mgmtTab=i;
  if (i===3) await markNotifsRead(); // notifications tab
  render();
};

// ── AVAILABILITY ──────────────────────────────────────────────────────────────
window.setAvailFn = async function(mid, pid, val) {
  if (S.userRole==='readonly') return;
  if (S.userRole==='member' && S.playerId!==pid) return;
  if (S.userRole==='member' && isAvailLocked(mid)) return;
  const old = getAvail(mid, pid);
  if (old===val) return;
  await fbSet(`sandhurst/availability/${mid}/${pid}`, val);
  // Notify manager of availability change (in-app)
  const player = S.players.find(p=>p.id===pid);
  const match  = getMatch(mid);
  const labels = {yes:'Available',no:'Unavailable',maybe:'Maybe'};
  await addNotification(
    `${player?.name} marked ${labels[val]} for vs ${match?.opponent} (${fmtDate(match?.date)})`,
    'manager', mid, 'availability'
  );
};

// ── SQUAD ─────────────────────────────────────────────────────────────────────
window.toggleSquadFn = async function(mid, pid) {
  if (S.userRole!=='manager') return;
  if (!iAmLock()) { const ok=await acquireLock(); if(!ok){alert(`${S.lockHolder} is editing.`);return;} }
  let sq = [...getSquad(mid)];
  const idx = sq.indexOf(pid);
  if (idx>-1) sq.splice(idx,1);
  else { if (sq.length>=11) return; sq.push(pid); }
  await fbSet(`sandhurst/squad/${mid}`, sq);
};

// ── DRAG DESKTOP ──────────────────────────────────────────────────────────────
let dragPid=null;
window.dStart=(e,pid)=>{ dragPid=pid; e.dataTransfer.effectAllowed='move'; };
window.dOver =e=>e.preventDefault();
window.dEnter=e=>e.currentTarget.classList.add('drag-over');
window.dLeave=e=>e.currentTarget.classList.remove('drag-over');
window.dDrop = async function(e, mid) {
  e.preventDefault();
  const tgt=e.currentTarget.dataset.pid;
  if (dragPid===tgt) return;
  if (!iAmLock()){const ok=await acquireLock();if(!ok){alert(`${S.lockHolder} is editing.`);return;}}
  const sq=[...getSquad(mid)]; const fi=sq.indexOf(dragPid),ti=sq.indexOf(tgt);
  if(fi>-1&&ti>-1){sq.splice(fi,1);sq.splice(ti,0,dragPid);}
  await fbSet(`sandhurst/squad/${mid}`,sq);
};
window.dEnd=()=>{dragPid=null;};

// ── DRAG TOUCH ────────────────────────────────────────────────────────────────
let tPid=null,tMid=null,tEl=null,tClone=null;
window.touchStart=(e,pid,mid)=>{tPid=pid;tMid=mid;tEl=e.currentTarget;tClone=tEl.cloneNode(true);tClone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;z-index:999;width:${tEl.offsetWidth}px`;document.body.appendChild(tClone);tEl.style.opacity='.3';};
window.touchMove=e=>{if(!tClone)return;e.preventDefault();const t=e.touches[0];tClone.style.left=(t.clientX-60)+'px';tClone.style.top=(t.clientY-20)+'px';document.querySelectorAll('.bat-row').forEach(r=>r.classList.remove('drag-over'));const el=document.elementFromPoint(t.clientX,t.clientY);const row=el&&el.closest('.bat-row');if(row&&row.dataset.pid!==tPid)row.classList.add('drag-over');};
window.touchEnd=async e=>{if(!tClone)return;document.body.removeChild(tClone);tClone=null;if(tEl)tEl.style.opacity='';const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const row=el&&el.closest('.bat-row');if(row&&row.dataset.pid!==tPid&&tMid&&S.userRole==='manager'){if(!iAmLock()){const ok=await acquireLock();if(!ok)return;}const sq=[...getSquad(tMid)];const fi=sq.indexOf(tPid),ti=sq.indexOf(row.dataset.pid);if(fi>-1&&ti>-1){sq.splice(fi,1);sq.splice(ti,0,tPid);}await fbSet(`sandhurst/squad/${tMid}`,sq);}tPid=null;tMid=null;tEl=null;};

// ── MATCH MANAGEMENT ──────────────────────────────────────────────────────────
window.saveMatch = async function(mid) {
  if (S.userRole!=='manager') return;
  const opp  = document.getElementById('edit-opp-'+mid)?.value?.trim();
  const date = document.getElementById('edit-date-'+mid)?.value;
  const time = document.getElementById('edit-time-'+mid)?.value;
  const venue= document.getElementById('edit-venue-'+mid)?.value;
  if (!opp||!date) return;
  const old = getMatch(mid);
  const changed = old.opponent!==opp||old.date!==date||old.time!==time||old.venue!==venue;
  await fbSet(`sandhurst/matches/${mid}`, {id:mid,opponent:opp,date,time:time||'13:00',venue});
  if (changed) {
    await addNotification(
      `Match updated: vs ${opp} — ${fmtDate(date)} at ${time||'13:00'} (${venue})`,
      'all', mid, 'match'
    );
  }
  render();
};

window.addMatch = async function() {
  const opp  = document.getElementById('new-opp')?.value?.trim();
  const date = document.getElementById('new-date')?.value;
  const time = document.getElementById('new-time')?.value;
  const venue= document.getElementById('new-venue')?.value;
  if (!opp||!date) { alert('Enter opponent and date.'); return; }
  const id = 'm' + Date.now();
  await fbSet(`sandhurst/matches/${id}`, {id,opponent:opp,date,time:time||'13:00',venue:venue||'Home'});
  await addNotification(`New match added: vs ${opp} — ${fmtDate(date)} at ${time||'13:00'} (${venue||'Home'})`, 'all', id, 'match');
  S.activeMatch = id;
  render();
};

window.deleteMatch = async function(mid) {
  if (!confirm('Remove this match?')) return;
  await fbSet(`sandhurst/matches/${mid}`, null);
  S.activeMatch = S.matches.filter(m=>m.id!==mid)[0]?.id || 'm1';
  render();
};

// ── SETTINGS ──────────────────────────────────────────────────────────────────
window.saveSettings = async function() {
  const rd = parseInt(document.getElementById('set-reminder')?.value)||6;
  const ld = parseInt(document.getElementById('set-lock')?.value)||3;
  const rt = document.getElementById('set-time')?.value||'12:00';
  await fbSet('sandhurst/settings', {reminderDays:rd, lockDays:ld, reminderTime:rt});
  showInAppBanner('Settings saved');
};

// ── EXPORTS ───────────────────────────────────────────────────────────────────
window.doExcel = function() {
  if (!window.XLSX){alert('Loading…');return;}
  const wb=XLSX.utils.book_new();
  const header=['Player',...S.matches.map(m=>`${m.opponent}\n${fmtDate(m.date)}`),'Played','Available','Unavailable'];
  const rows=[header];
  S.players.forEach(p=>{
    const cells=S.matches.map(m=>{
      if(getSquad(m.id).includes(p.id))return'Played';
      const av=getAvail(m.id,p.id);
      return av==='yes'?'Available':av==='maybe'?'Maybe':av==='no'?'Unavailable':'-';
    });
    rows.push([p.name,...cells,
      S.matches.filter(m=>getSquad(m.id).includes(p.id)).length,
      S.matches.filter(m=>['yes','maybe'].includes(getAvail(m.id,p.id))).length,
      S.matches.filter(m=>getAvail(m.id,p.id)==='no').length
    ]);
  });
  rows.push([]);
  rows.push(['Totals',...S.matches.map(m=>getSquad(m.id).length+' played'),'','','']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:20},...S.matches.map(()=>({wch:18})),{wch:8},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Season Overview');
  XLSX.writeFile(wb,'SandhurstCC_Season.xlsx');
};

window.doPDF = function(mid) {
  if (!window.jspdf){alert('Loading…');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  const match=getMatch(mid);
  const sq=getSquad(mid);
  const pw=doc.internal.pageSize.getWidth();
  const ph=doc.internal.pageSize.getHeight();
  const img=new Image(); img.src=LOGO;
  img.onload=function(){
    try{doc.setGState(doc.GState({opacity:0.07}));doc.addImage(img,'JPEG',pw/2-50,ph/2-50,100,100);}catch(e){}
    try{doc.setGState(doc.GState({opacity:1}));doc.addImage(img,'JPEG',14,8,22,22);}catch(e){}
    doc.setTextColor(26,92,46);doc.setFont('helvetica','bold');doc.setFontSize(16);
    doc.text('Sandhurst Cricket Club',40,18);
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80,80,80);
    doc.text(`vs ${match.opponent}  ·  ${fmtDate(match.date)} ${fmtTime(match.time)}  ·  ${match.venue}`,40,26);
    doc.text(`Generated: ${new Date().toLocaleDateString('en-GB')}`,40,32);
    doc.setDrawColor(26,92,46);doc.setLineWidth(0.5);doc.line(14,36,pw-14,36);
    let y=48;
    doc.setFillColor(26,92,46);doc.rect(14,y-7,pw-28,9,'F');
    doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text('#',16,y);doc.text('Player',26,y);doc.text('Role',100,y);doc.text('Notes',150,y);
    y+=11;
    if(sq.length===0){
      doc.setTextColor(180,180,180);doc.setFont('helvetica','normal');
      doc.text('No players selected yet.',16,y+6);
    } else {
      sq.forEach((pid,i)=>{
        const p=S.players.find(x=>x.id===pid);if(!p)return;
        if(i%2===0){doc.setFillColor(244,249,244);doc.rect(14,y-6,pw-28,10,'F');}
        doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(9);
        doc.text(String(i+1),16,y);doc.text(p.name,26,y);doc.text(p.role,100,y);
        const notes=[];if(p.captain)notes.push('Captain');if(p.keeper)notes.push('Wicketkeeper');
        if(notes.length)doc.text(notes.join(' · '),150,y);
        y+=10;
      });
    }
    doc.setDrawColor(26,92,46);doc.line(14,y+4,pw-14,y+4);
    doc.setTextColor(180,180,180);doc.setFontSize(8);
    doc.text('Sandhurst Cricket Club · Est. 1949 · Kent',pw/2,ph-8,{align:'center'});
    doc.save(`SandhurstCC_vs_${match.opponent.replace(/\s/g,'_')}.pdf`);
  };
};

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  if(S.screen==='login'){renderLogin(app);return;}
  if(S.screen==='member'){renderMember(app);return;}
  renderManager(app);
}

const logoImg = size => `<img src="${LOGO}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0">`;

function topbar(role, name) {
  const badges={manager:'rb-manager',readonly:'rb-readonly',member:'rb-member'};
  const labels={manager:'Manager',readonly:'Read-only',member:'Member'};
  return `<div class="topbar">
    <div class="topbar-left">${logoImg(36)}<span class="club-name">Sandhurst CC</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="sync-dot${S.syncLive?' live':''}"></div>
      ${name?`<span style="font-size:12px;color:#888;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>`:''}
      <span class="role-badge ${badges[role]}">${labels[role]}</span>
      <button class="btn sm" onclick="doLogout()">Out</button>
    </div>
  </div>`;
}

function matchTabs() {
  return `<div class="match-scroll">${S.matches.map(m=>{
    const cls=m.venue==='Home'?'home':'away';
    const act=S.activeMatch===m.id?'active':'';
    const days=daysUntil(m.id);
    const locked=isAvailLocked(m.id);
    return `<button class="mtab ${cls} ${act}" onclick="setMatch('${m.id}')">
      <div style="font-weight:600;font-size:13px">${m.opponent}</div>
      <div style="font-size:11px;opacity:.75;margin-top:2px">${fmtDate(m.date)} ${m.time?m.time:''}</div>
      ${locked?`<div style="font-size:10px;color:#a32d2d;margin-top:1px">🔒 Locked</div>`:
        days<=S.settings.reminderDays?`<div style="font-size:10px;color:#854f0b;margin-top:1px">${days}d away</div>`:''}
    </button>`;
  }).join('')}</div>`;
}

function syms(p,mgr){
  if(!mgr) return '';
  return (p.captain?'<span style="font-size:13px">🛡</span>':'')+(p.keeper?'<span style="font-size:13px">🧤</span>':'');
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────

// ── MEMBER ────────────────────────────────────────────────────────────────────
function renderMember(app) {
  const mid=S.activeMatch; const match=getMatch(mid);
  const pillCls=match.venue==='Home'?'pill-home':'pill-away';
  const locked=isAvailLocked(mid);
  const days=daysUntil(mid);
  const myNotifs=S.notifications.filter(n=>(n.target==='all'||n.target===S.playerId));
  const unread=myNotifs.filter(n=>!n.read?.[S.playerId]).length;
  let h=topbar('member',S.playerName);
  // Reminder nudge
  if(days<=S.settings.reminderDays&&days>0&&getAvail(mid,S.playerId)==='none'){
    h+=`<div class="lock-banner">⏰ Please mark your availability for vs ${match.opponent} — ${days} day${days===1?'':'s'} to go!</div>`;
  }
  h+=`<div class="section-title">My availability</div>`;
  h+=`<div class="sub">Only your own row is editable.</div>`;
  h+=matchTabs();
  h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
  if(locked){
    h+=`<div class="locked-banner">🔒 Availability is locked ${S.settings.lockDays} days before the match. Contact a manager to make changes.</div>`;
  }
  h+=`<div class="card">`;
  S.players.forEach(p=>{
    const av=getAvail(mid,p.id);
    const me=p.id===S.playerId;
    const canEdit=me&&!locked;
    h+=`<div class="avail-row" style="${!me?'opacity:.35;pointer-events:none':''}">
      <div class="avatar" style="${me?'background:#1a5c2e;color:#fff':''}">${ini(p.name)}</div>
      <div class="pname">${p.name}</div>
      ${canEdit?`<div style="display:flex;gap:5px">
        <div class="tog${av==='yes'?' ay':''}" onclick="setAvailFn('${mid}','${p.id}','yes')">Yes</div>
        <div class="tog${av==='maybe'?' am':''}" onclick="setAvailFn('${mid}','${p.id}','maybe')">Maybe</div>
        <div class="tog${av==='no'?' an':''}" onclick="setAvailFn('${mid}','${p.id}','no')">No</div>
      </div>`:`<span class="avail-tag ${av==='yes'?'tag-yes':av==='no'?'tag-no':av==='maybe'?'tag-maybe':'tag-none'}">${av==='yes'?'Available':av==='no'?'Unavailable':av==='maybe'?'Maybe':'Not set'}</span>`}
    </div>`;
  });
  h+=`</div>`;
  // Notifications section
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div class="section-title" style="margin:0">Notifications${unread>0?` <span style="font-size:13px;font-weight:400;color:#e24b4a">(${unread} new)</span>`:''}</div>
  </div>`;
  if(myNotifs.length===0){
    h+=`<div style="color:#bbb;font-size:13px;text-align:center;padding:16px">No notifications yet.</div>`;
  } else {
    h+=`<div class="card">`;
    myNotifs.slice(0,10).forEach(n=>{
      const isUnread=!n.read?.[S.playerId];
      h+=`<div class="notif-item${isUnread?' unread':''}">
        <div class="notif-dot${isUnread?'':' read'}"></div>
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${timeAgo(n.ts)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  app.innerHTML=h;
  // Mark as read after render
  setTimeout(()=>markNotifsRead(),1000);
}

// ── MANAGER ───────────────────────────────────────────────────────────────────
function renderManager(app) {
  const mid=S.activeMatch; const match=getMatch(mid);
  const pillCls=match.venue==='Home'?'pill-home':'pill-away';
  const isRO=S.userRole==='readonly';
  const tabs=['Availability','Team','Matches','Notifications','Export','Settings'];
  let h=topbar(S.userRole,S.playerName);
  if(!isRO&&S.lockHolder&&!iAmLock()&&Date.now()<(S.lockExpiry||0)){
    h+=`<div class="lock-banner">🔒 ${S.lockHolder} is editing team selection.</div>`;
  }
  h+=`<div class="mgmt-tabs">${tabs.map((t,i)=>{
    const badge=(i===3&&S.unreadNotifs>0)?`<span class="nbadge">${S.unreadNotifs}</span>`:'';
    return `<button class="mgtab${S.mgmtTab===i?' active':''}" onclick="setMgmtTab(${i})">${t}${badge}</button>`;
  }).join('')}</div>`;

  // ── TAB 0: AVAILABILITY ──
  if(S.mgmtTab===0){
    h+=`<div class="section-title">Availability</div>`;
    h+=matchTabs();
    h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
    if(isAvailLocked(mid)){
      h+=`<div class="locked-banner">🔒 Availability locked for members (${S.settings.lockDays} days rule). You can still override below.</div>`;
    }
    h+=`<div class="stats-row">
      <div class="stat-box"><div class="stat-n">${availCount(mid,'yes')}</div><div class="stat-l">Available</div></div>
      <div class="stat-box"><div class="stat-n">${availCount(mid,'maybe')}</div><div class="stat-l">Maybe</div></div>
      <div class="stat-box"><div class="stat-n">${availCount(mid,'no')}</div><div class="stat-l">Unavailable</div></div>
      <div class="stat-box"><div class="stat-n">${availCount(mid,'none')}</div><div class="stat-l">No response</div></div>
    </div>`;
    h+=`<div class="card">`;
    S.players.forEach(p=>{
      const av=getAvail(mid,p.id);
      const tCls={yes:'tag-yes',no:'tag-no',maybe:'tag-maybe',none:'tag-none'}[av];
      const tLbl={yes:'Available',no:'Unavailable',maybe:'Maybe',none:'No response'}[av];
      h+=`<div class="avail-row">
        <div class="avatar">${ini(p.name)}</div>
        <div class="pname">${p.name}${syms(p,true)}<span class="badge-role">${p.role}</span></div>
        <span class="avail-tag ${tCls}" style="margin-right:6px">${tLbl}</span>
        ${!isRO?`<div style="display:flex;gap:3px">
          <div class="tog${av==='yes'?' ay':''}" onclick="setAvailFn('${mid}','${p.id}','yes')">Y</div>
          <div class="tog${av==='maybe'?' am':''}" onclick="setAvailFn('${mid}','${p.id}','maybe')">M</div>
          <div class="tog${av==='no'?' an':''}" onclick="setAvailFn('${mid}','${p.id}','no')">N</div>
        </div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  // ── TAB 1: TEAM SELECTION ──
  else if(S.mgmtTab===1){
    const sq=getSquad(mid);
    const canEdit=!isRO&&(iAmLock()||!S.lockHolder||Date.now()>(S.lockExpiry||0));
    const availP=S.players.filter(p=>['yes','maybe'].includes(getAvail(mid,p.id)));
    const notSel=availP.filter(p=>!sq.includes(p.id));
    h+=`<div class="section-title">Team selection</div>`;
    h+=matchTabs();
    h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
    h+=`<div class="stats-row">
      <div class="stat-box"><div class="stat-n">${sq.length}</div><div class="stat-l">Selected</div></div>
      <div class="stat-box"><div class="stat-n">${Math.max(0,11-sq.length)}</div><div class="stat-l">Spots left</div></div>
      <div class="stat-box"><div class="stat-n">${availP.length}</div><div class="stat-l">Available</div></div>
    </div>`;
    if(sq.length>0){
      h+=`<div style="font-size:13px;font-weight:600;color:#1a5c2e;margin-bottom:8px">Batting order${canEdit?' <span style="font-weight:400;color:#bbb;font-size:11px">— drag to reorder</span>':''}</div>`;
      sq.forEach((pid,i)=>{
        const p=S.players.find(x=>x.id===pid);if(!p)return;
        const av=getAvail(mid,pid);
        const da=canEdit?`draggable="true" data-pid="${pid}" ondragstart="dStart(event,'${pid}')" ondragover="dOver(event)" ondragenter="dEnter(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${mid}')" ondragend="dEnd()" ontouchstart="touchStart(event,'${pid}','${mid}')" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)"`:'' ;
        h+=`<div class="bat-row" ${da}>
          ${canEdit?`<span class="drag-handle">⠿</span>`:''}
          <div class="bat-num filled">${i+1}</div>
          <div class="avatar" style="background:#1a5c2e;color:#fff">${ini(p.name)}</div>
          <div class="pname">${p.name}${syms(p,true)}<span class="badge-role">${p.role}</span></div>
          <span class="avail-tag ${av==='yes'?'tag-yes':'tag-maybe'}" style="margin-right:4px">${av==='yes'?'Avail':'Maybe'}</span>
          ${canEdit?`<button class="btn ghost" onclick="toggleSquadFn('${mid}','${pid}')">×</button>`:''}
        </div>`;
      });
    }
    if(notSel.length>0&&canEdit){
      h+=`<div style="font-size:13px;font-weight:600;color:#555;margin:12px 0 8px">Available to add</div>`;
      notSel.forEach(p=>{
        const av=getAvail(mid,p.id);
        const dis=sq.length>=11;
        h+=`<div class="sel-row" onclick="${dis?'':'toggleSquadFn(\''+mid+'\',\''+p.id+'\')'}" style="${dis?'opacity:.4;cursor:not-allowed':''}">
          <div class="bat-num"></div>
          <div class="avatar">${ini(p.name)}</div>
          <div class="pname">${p.name}${syms(p,true)}<span class="badge-role">${p.role}</span></div>
          <span class="avail-tag ${av==='yes'?'tag-yes':'tag-maybe'}">${av==='yes'?'Available':'Maybe'}</span>
          <span style="font-size:12px;color:#1a5c2e;margin-left:auto">+ Add</span>
        </div>`;
      });
    }
    if(availP.length===0) h+=`<div style="text-align:center;color:#bbb;padding:24px;font-size:13px">No available players — check availability tab first.</div>`;
  }

  // ── TAB 2: MATCHES ──
  else if(S.mgmtTab===2){
    h+=`<div class="section-title">Manage matches</div>`;
    h+=`<div class="sub">Edit details — any change sends a notification to all members.</div>`;
    S.matches.forEach(m=>{
      const pillc=m.venue==='Home'?'pill-home':'pill-away';
      h+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span class="match-pill ${pillc}" style="margin:0">vs ${m.opponent} · ${fmtDate(m.date)}</span>
          ${!isRO?`<button class="btn sm" style="color:#a32d2d;border-color:#f09595" onclick="deleteMatch('${m.id}')">Remove</button>`:''}
        </div>`;
      if(!isRO){
        h+=`<div class="match-form-row">
          <input id="edit-opp-${m.id}" value="${m.opponent}" placeholder="Opponent">
          <select id="edit-venue-${m.id}">
            <option${m.venue==='Home'?' selected':''}>Home</option>
            <option${m.venue==='Away'?' selected':''}>Away</option>
          </select>
        </div>
        <div class="match-form-row">
          <input type="date" id="edit-date-${m.id}" value="${m.date}">
          <input type="time" id="edit-time-${m.id}" value="${m.time||'13:00'}">
        </div>
        <button class="btn primary" style="width:100%;margin-top:4px" onclick="saveMatch('${m.id}')">Save changes</button>`;
      } else {
        h+=`<div style="font-size:13px;color:#888">${fmtDate(m.date)} at ${m.time||'13:00'} · ${m.venue}</div>`;
      }
      h+=`</div>`;
    });
    if(!isRO){
      h+=`<div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px;color:#1a5c2e">Add new match</div>
        <div class="match-form-row">
          <input id="new-opp" placeholder="Opponent">
          <select id="new-venue"><option>Home</option><option>Away</option></select>
        </div>
        <div class="match-form-row">
          <input type="date" id="new-date">
          <input type="time" id="new-time" value="13:00">
        </div>
        <button class="btn primary" style="width:100%;margin-top:4px" onclick="addMatch()">+ Add match</button>
      </div>`;
    }
  }

  // ── TAB 3: NOTIFICATIONS ──
  else if(S.mgmtTab===3){
    const mgNotifs=S.notifications.filter(n=>n.target==='manager'||n.target==='all');
    h+=`<div class="section-title">Notifications</div>`;
    h+=`<div class="sub">Availability changes and match updates.</div>`;
    if(mgNotifs.length===0){
      h+=`<div style="color:#bbb;font-size:13px;text-align:center;padding:24px">No notifications yet.</div>`;
    } else {
      h+=`<div class="card">`;
      mgNotifs.slice(0,30).forEach(n=>{
        const isUnread=!n.read?.manager;
        h+=`<div class="notif-item${isUnread?' unread':''}">
          <div class="notif-dot${isUnread?'':' read'}"></div>
          <div>
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${timeAgo(n.ts)}</div>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // ── TAB 4: EXPORT ──
  else if(S.mgmtTab===4){
    h+=`<div class="section-title">Export</div>`;
    h+=matchTabs();
    h+=`<span class="match-pill ${pillCls}">vs ${match.opponent} · ${fmtDate(match.date)}${match.time?' at '+match.time:''} · ${match.venue}</span>`;
    h+=`<div class="export-row">
      <button class="btn primary" onclick="doExcel()">Season Excel</button>
      <button class="btn blue" onclick="doPDF('${mid}')">Team PDF</button>
    </div>
    <div style="font-size:12px;color:#aaa;margin-top:4px">Excel: all players × all matches, single sheet with totals.<br>PDF: selected XI with batting order, captain &amp; keeper, Sandhurst logo watermark.</div>`;
  }

  // ── TAB 5: SETTINGS ──
  else if(S.mgmtTab===5){
    h+=`<div class="section-title">Settings</div>`;
    h+=`<div class="sub">Changes apply to all users immediately.</div>`;
    h+=`<div class="card">
      <div class="settings-row">
        <div><div class="settings-label">Availability reminder</div><div class="settings-sub">Push notification sent to members X days before match if no response</div></div>
        <div class="settings-val"><input class="num-input" type="number" id="set-reminder" min="1" max="14" value="${S.settings.reminderDays}"><span style="font-size:13px;color:#888">days</span></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Availability lock</div><div class="settings-sub">Members cannot change availability X days before match</div></div>
        <div class="settings-val"><input class="num-input" type="number" id="set-lock" min="1" max="10" value="${S.settings.lockDays}"><span style="font-size:13px;color:#888">days</span></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Reminder time</div><div class="settings-sub">Time of day the push reminder fires (used by Cloud Function)</div></div>
        <div class="settings-val"><input type="time" id="set-time" value="${S.settings.reminderTime}" style="width:100px;margin:0"></div>
      </div>
      <button class="btn primary" style="width:100%;margin-top:14px" onclick="saveSettings()">Save settings</button>
    </div>`;
  }

  app.innerHTML=h;
}

// ── TIME AGO ──────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  render();
  setInterval(()=>{ if(iAmLock()) fbSet('sandhurst/lock',{holder:S.playerName,expiry:Date.now()+LOCK_TTL}); },60000);
  window.addEventListener('beforeunload',()=>{ if(iAmLock()) releaseLock(); });
});
</script>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
